services:
  app_proxy:
    environment:
      APP_HOST: ilya-auto-h265-video-converter_server_1
      APP_PORT: 8080

  server:
    image: python:3.12-slim
    restart: on-failure
    working_dir: /app
    environment:
      APP_PORT: "8080"
      DATA_DIR: /data
      DEFAULT_INPUT_PATH: /media/porn
      DEFAULT_OUTPUT_PATH: /media/new
      DEFAULT_FAILED_PATH: /media/failed_convert
      DEFAULT_TEMP_PATH: /media/temp_convert
      FFMPEG_THREADS: ${FFMPEG_THREADS:-0}
    volumes:
      - ${UMBREL_ROOT}/app-data/ilya-auto-h265-video-converter/data:/data
      - ${UMBREL_ROOT}/external/ssd990_main:/media
      - ./app:/app/app:ro
      - ./requirements.txt:/app/requirements.txt:ro
    command:
      - sh
      - -c
      - |
        set -e
        apt-get update
        apt-get install -y --no-install-recommends ffmpeg ca-certificates
        rm -rf /var/lib/apt/lists/*
        pip install --no-cache-dir -r /app/requirements.txt
        exec uvicorn app.main:app --host 0.0.0.0 --port 8080
