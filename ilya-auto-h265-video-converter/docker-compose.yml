services:
  app_proxy:
    environment:
      APP_HOST: ilya-auto-h265-video-converter_server_1
      APP_PORT: 8080

  server:
    image: python:3.12-slim
    restart: on-failure
    stop_grace_period: 60s
    environment:
      APP_PORT: "8080"
      DATA_DIR: /data
      MEDIA_ROOT: /media
      HOST_ROOT: /host
      HOST_EXTERNAL_ROOT: ${UMBREL_ROOT}/external
    volumes:
      - /:/host
      - ${UMBREL_ROOT}/external:/media
      - ${UMBREL_ROOT}/app-data/ilya-auto-h265-video-converter/data:/data
      - ${UMBREL_ROOT}/app-data/ilya-auto-h265-video-converter/server.py:/app/server.py:ro
    command:
      - sh
      - -c
      - |
        set -e
        if ! command -v ffmpeg >/dev/null 2>&1; then
          apt-get update
          apt-get install -y --no-install-recommends ffmpeg ca-certificates
          rm -rf /var/lib/apt/lists/*
        fi
        exec python3 /app/server.py
    container_name: ilya-auto-h265-video-converter_server_1
