services:
  app_proxy:
    environment:
      APP_HOST: ilya-auto-h265-video-converter_server_1
      APP_PORT: 8080

  server:
    image: python:3.12-slim
    restart: on-failure
    stop_grace_period: 60s
    environment:
      APP_PORT: "8080"
      DATA_DIR: /data
      MEDIA_ROOT: /media
      HOST_EXTERNAL_ROOT: ${UMBREL_ROOT}/external
    volumes:
      - ${UMBREL_ROOT}/external:/media
      - ${UMBREL_ROOT}/app-data/ilya-auto-h265-video-converter/data:/data
    command:
      - sh
      - -c
      - |
        set -e
        if ! command -v ffmpeg >/dev/null 2>&1; then
          apt-get update
          apt-get install -y --no-install-recommends ffmpeg ca-certificates
          rm -rf /var/lib/apt/lists/*
        fi
        cat > /tmp/server.py <<'PY'
        #!/usr/bin/env python3
        import json
        import os
        import re
        import shutil
        import signal
        import sqlite3
        import subprocess
        import threading
        import time
        import uuid
        from datetime import datetime
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
        from urllib.parse import urlparse, parse_qs, unquote
        
        APP_VERSION = "0.1.0"
        DATA_DIR = os.environ.get("DATA_DIR", "/data")
        DB_PATH = os.path.join(DATA_DIR, "app.sqlite")
        SETTINGS_PATH = os.path.join(DATA_DIR, "settings.json")
        LOG_DIR = os.path.join(DATA_DIR, "logs")
        FFMPEG_LOG = os.path.join(LOG_DIR, "ffmpeg.log")
        APP_LOG = os.path.join(LOG_DIR, "app.log")
        HOST_EXTERNAL_ROOT = os.environ.get("HOST_EXTERNAL_ROOT", "/home/umbrel/umbrel/external").rstrip("/")
        MEDIA_ROOT = os.environ.get("MEDIA_ROOT", "/media").rstrip("/")
        
        VIDEO_EXTS = {".mp4", ".mkv", ".mov", ".avi", ".m4v", ".webm"}
        SUCCESS_STATUSES = {"success", "skip_ok", "moved_already_hevc", "copied_already_hevc", "hardlinked_already_hevc", "manual_ok"}
        TERMINAL_STATUSES = SUCCESS_STATUSES | {"moved_to_failed", "skipped", "deleted"}
        
        os.makedirs(DATA_DIR, exist_ok=True)
        os.makedirs(LOG_DIR, exist_ok=True)
        
        db_lock = threading.RLock()
        settings_lock = threading.RLock()
        worker_control_lock = threading.RLock()
        current_process = None
        shutdown_event = threading.Event()
        worker_started_at = time.time()
        last_scan_at = 0
        last_worker_error = ""
        
        DEFAULT_SETTINGS = {
            "worker_enabled": True,
            "auto_convert_enabled": True,
            "input_path": "/media/ssd990_main/porn",
            "output_path": "/media/ssd990_main/new",
            "failed_path": "/media/ssd990_main/failed_convert",
            "use_temp_path": False,
            "temp_path": "/media/ssd990_main/new/.tmp",
            "preserve_input_folder": True,
            "scan_interval_seconds": 30,
            "stable_check_seconds": 20,
            "stable_check_count": 2,
            "allowed_extensions": "mp4,mkv,mov,avi,m4v,webm",
            "include_pattern": "",
            "exclude_pattern": "",
            "min_duration_seconds": 0,
            "max_duration_seconds": 0,
            "min_size_mb": 0,
            "max_size_mb": 0,
            "process_codecs": "h264,mpeg4,vp9,av1,unknown",
            "hevc_action": "move",  # skip, move, copy, hardlink
            "max_width": 4096,
            "max_height": 2048,
            "scale_if_too_large": True,
            "video_encoder": "libx265",
            "crf": 24,
            "preset": "medium",
            "pixel_format": "yuv420p",
            "container": "mp4",
            "audio_mode": "aac",  # aac, copy, none
            "audio_bitrate": "160k",
            "copy_metadata": True,
            "copy_chapters": True,
            "faststart": True,
            "ffmpeg_threads": 0,
            "max_retries": 1,
            "move_failed_after_retries": True,
            "delete_source_after_success": False,
            "auto_safe_retry": True,
            "safe_remux_to_mp4": True,
            "allow_mkv_fallback": False,
            "extra_ffmpeg_args": ""
        }
        
        
        def now_iso():
            return datetime.now().strftime("%Y-%m-%d %H:%M:%S")
        
        
        def log_app(message):
            line = f"{now_iso()} {message}\n"
            try:
                with open(APP_LOG, "a", encoding="utf-8") as f:
                    f.write(line)
            except Exception:
                pass
        
        
        def load_settings():
            with settings_lock:
                data = dict(DEFAULT_SETTINGS)
                if os.path.exists(SETTINGS_PATH):
                    try:
                        with open(SETTINGS_PATH, "r", encoding="utf-8") as f:
                            saved = json.load(f)
                        if isinstance(saved, dict):
                            data.update(saved)
                    except Exception as e:
                        log_app(f"settings_load_error {e}")
                return data
        
        
        def save_settings(data):
            with settings_lock:
                merged = dict(DEFAULT_SETTINGS)
                merged.update(data or {})
                normalize_settings_inplace(merged)
                tmp = SETTINGS_PATH + ".tmp"
                with open(tmp, "w", encoding="utf-8") as f:
                    json.dump(merged, f, ensure_ascii=False, indent=2)
                os.replace(tmp, SETTINGS_PATH)
                return merged
        
        
        def normalize_settings_inplace(s):
            for key in ["scan_interval_seconds", "stable_check_seconds", "stable_check_count", "max_width", "max_height", "crf", "ffmpeg_threads", "max_retries"]:
                try:
                    s[key] = int(s.get(key, DEFAULT_SETTINGS[key]))
                except Exception:
                    s[key] = DEFAULT_SETTINGS[key]
            for key in ["min_duration_seconds", "max_duration_seconds", "min_size_mb", "max_size_mb"]:
                try:
                    s[key] = float(s.get(key, DEFAULT_SETTINGS[key]))
                except Exception:
                    s[key] = DEFAULT_SETTINGS[key]
            for key in ["worker_enabled", "auto_convert_enabled", "use_temp_path", "preserve_input_folder", "scale_if_too_large", "copy_metadata", "copy_chapters", "faststart", "move_failed_after_retries", "delete_source_after_success", "auto_safe_retry", "safe_remux_to_mp4", "allow_mkv_fallback"]:
                s[key] = bool(s.get(key, DEFAULT_SETTINGS[key]))
        
        
        def to_container_path(path):
            if not path:
                return path
            path = path.strip()
            if path.startswith(HOST_EXTERNAL_ROOT + "/"):
                return MEDIA_ROOT + path[len(HOST_EXTERNAL_ROOT):]
            return path
        
        
        def to_display_path(path):
            return path
        
        
        def split_csv(value):
            if not value:
                return []
            return [x.strip().lower().lstrip(".") for x in str(value).split(",") if x.strip()]
        
        
        def safe_rel(path, base):
            path = os.path.abspath(path)
            base = os.path.abspath(base)
            try:
                rel = os.path.relpath(path, base)
            except Exception:
                rel = os.path.basename(path)
            if rel.startswith(".."):
                rel = os.path.basename(path)
            return rel
        
        
        def ensure_parent(path):
            os.makedirs(os.path.dirname(path), exist_ok=True)
        
        
        def db_connect():
            conn = sqlite3.connect(DB_PATH, timeout=30, check_same_thread=False)
            conn.row_factory = sqlite3.Row
            return conn
        
        
        def init_db():
            with db_lock:
                conn = db_connect()
                try:
                    conn.execute("""
                        CREATE TABLE IF NOT EXISTS jobs (
                            id TEXT PRIMARY KEY,
                            source_path TEXT NOT NULL,
                            output_path TEXT,
                            temp_path TEXT,
                            status TEXT NOT NULL,
                            source_codec TEXT,
                            source_width INTEGER,
                            source_height INTEGER,
                            source_duration REAL,
                            source_size_bytes INTEGER DEFAULT 0,
                            output_size_bytes INTEGER DEFAULT 0,
                            progress_percent REAL DEFAULT 0,
                            fps TEXT,
                            speed TEXT,
                            eta_seconds REAL DEFAULT 0,
                            started_at TEXT,
                            finished_at TEXT,
                            elapsed_seconds REAL DEFAULT 0,
                            error_message TEXT,
                            retry_count INTEGER DEFAULT 0,
                            mode TEXT,
                            created_at TEXT,
                            updated_at TEXT
                        )
                    """)
                    conn.execute("CREATE INDEX IF NOT EXISTS idx_jobs_source ON jobs(source_path)")
                    conn.execute("CREATE INDEX IF NOT EXISTS idx_jobs_status ON jobs(status)")
                    conn.commit()
                finally:
                    conn.close()
        
        
        def row_to_dict(row):
            if not row:
                return None
            d = dict(row)
            return d
        
        
        def upsert_job(source_path, status="pending"):
            with db_lock:
                conn = db_connect()
                try:
                    row = conn.execute("SELECT * FROM jobs WHERE source_path=? ORDER BY created_at DESC LIMIT 1", (source_path,)).fetchone()
                    if row:
                        return row_to_dict(row)
                    jid = uuid.uuid4().hex
                    ts = now_iso()
                    conn.execute("""
                        INSERT INTO jobs(id, source_path, status, created_at, updated_at)
                        VALUES(?,?,?,?,?)
                    """, (jid, source_path, status, ts, ts))
                    conn.commit()
                    return row_to_dict(conn.execute("SELECT * FROM jobs WHERE id=?", (jid,)).fetchone())
                finally:
                    conn.close()
        
        
        def update_job(job_id, **fields):
            if not fields:
                return
            fields["updated_at"] = now_iso()
            keys = list(fields.keys())
            sql = "UPDATE jobs SET " + ", ".join([k + "=?" for k in keys]) + " WHERE id=?"
            vals = [fields[k] for k in keys] + [job_id]
            with db_lock:
                conn = db_connect()
                try:
                    conn.execute(sql, vals)
                    conn.commit()
                finally:
                    conn.close()
        
        
        def get_job(job_id):
            with db_lock:
                conn = db_connect()
                try:
                    return row_to_dict(conn.execute("SELECT * FROM jobs WHERE id=?", (job_id,)).fetchone())
                finally:
                    conn.close()
        
        
        def get_existing_job_for_source(src):
            with db_lock:
                conn = db_connect()
                try:
                    return row_to_dict(conn.execute("SELECT * FROM jobs WHERE source_path=? ORDER BY created_at DESC LIMIT 1", (src,)).fetchone())
                finally:
                    conn.close()
        
        
        def list_jobs(limit=300, status=None):
            with db_lock:
                conn = db_connect()
                try:
                    if status:
                        rows = conn.execute("SELECT * FROM jobs WHERE status=? ORDER BY created_at DESC LIMIT ?", (status, limit)).fetchall()
                    else:
                        rows = conn.execute("SELECT * FROM jobs ORDER BY created_at DESC LIMIT ?", (limit,)).fetchall()
                    return [row_to_dict(r) for r in rows]
                finally:
                    conn.close()
        
        
        def probe_json(path):
            cmd = ["ffprobe", "-v", "error", "-print_format", "json", "-show_format", "-show_streams", path]
            try:
                cp = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=60)
                if cp.returncode != 0:
                    return None, cp.stderr.strip()
                return json.loads(cp.stdout), ""
            except Exception as e:
                return None, str(e)
        
        
        def get_video_info(path):
            data, err = probe_json(path)
            if not data:
                return None, err
            vstream = None
            astreams = []
            for s in data.get("streams", []):
                if s.get("codec_type") == "video" and vstream is None:
                    vstream = s
                if s.get("codec_type") == "audio":
                    astreams.append(s)
            if not vstream:
                return None, "no video stream"
            fmt = data.get("format", {})
            duration = vstream.get("duration") or fmt.get("duration") or 0
            try:
                duration = float(duration)
            except Exception:
                duration = 0.0
            try:
                size = os.path.getsize(path)
            except Exception:
                size = int(float(fmt.get("size", 0) or 0))
            return {
                "codec": str(vstream.get("codec_name") or "unknown"),
                "width": int(vstream.get("width") or 0),
                "height": int(vstream.get("height") or 0),
                "duration": duration,
                "size": size,
                "audio_count": len(astreams)
            }, ""
        
        
        def is_valid_video(path):
            info, err = get_video_info(path)
            return bool(info and info.get("codec") and info.get("width", 0) > 0)
        
        
        def file_is_stable(path, settings):
            checks = max(1, int(settings.get("stable_check_count", 2)))
            delay = max(1, int(settings.get("stable_check_seconds", 20)))
            last = -1
            stable = 0
            while not shutdown_event.is_set():
                if not os.path.exists(path):
                    return False
                try:
                    size = os.path.getsize(path)
                except Exception:
                    return False
                if size == last and size > 0:
                    stable += 1
                else:
                    stable = 0
                last = size
                if stable >= checks:
                    return True
                time.sleep(delay)
            return False
        
        
        def compute_output_path(src, settings, info, force_ext=None, suffix=None):
            input_path = to_container_path(settings.get("input_path", DEFAULT_SETTINGS["input_path"])).rstrip("/")
            output_root = to_container_path(settings.get("output_path", DEFAULT_SETTINGS["output_path"])).rstrip("/")
            rel = safe_rel(src, input_path)
            if settings.get("preserve_input_folder", True):
                rel = os.path.basename(input_path) + "/" + rel
            rel_dir = os.path.dirname(rel)
            base = os.path.basename(rel)
            name, ext = os.path.splitext(base)
            too_large = int(info.get("width", 0)) > int(settings.get("max_width", 4096)) or int(info.get("height", 0)) > int(settings.get("max_height", 2048))
            if suffix is None:
                suffix = "_h265"
                if too_large and settings.get("scale_if_too_large", True):
                    suffix = f"_{settings.get('max_width',4096)}x{settings.get('max_height',2048)}_h265"
            ext_out = force_ext or "." + str(settings.get("container", "mp4")).lstrip(".")
            return os.path.join(output_root, rel_dir, name + suffix + ext_out)
        
        
        def temp_for_output(dst, settings):
            if settings.get("use_temp_path"):
                temp_root = to_container_path(settings.get("temp_path", "")).rstrip("/")
                if temp_root:
                    os.makedirs(temp_root, exist_ok=True)
                    return os.path.join(temp_root, os.path.basename(dst) + ".tmp")
            return dst + ".tmp" + os.path.splitext(dst)[1]
        
        
        def should_include_file(path, settings):
            ext = os.path.splitext(path)[1].lower().lstrip(".")
            allowed = split_csv(settings.get("allowed_extensions")) or list(VIDEO_EXTS)
            allowed = [e.lstrip(".").lower() for e in allowed]
            if ext not in allowed:
                return False
            inc = settings.get("include_pattern", "").strip()
            exc = settings.get("exclude_pattern", "").strip()
            if inc and inc.lower() not in path.lower():
                return False
            if exc and exc.lower() in path.lower():
                return False
            return True
        
        
        def scan_files():
            global last_scan_at
            settings = load_settings()
            input_path = to_container_path(settings.get("input_path", DEFAULT_SETTINGS["input_path"]))
            if not os.path.isdir(input_path):
                last_scan_at = time.time()
                return 0
            count = 0
            for root, dirs, files in os.walk(input_path):
                # never walk output or failed if user accidentally nested them
                outp = os.path.abspath(to_container_path(settings.get("output_path", "")))
                failp = os.path.abspath(to_container_path(settings.get("failed_path", "")))
                absroot = os.path.abspath(root)
                if absroot.startswith(outp + os.sep) or absroot == outp or absroot.startswith(failp + os.sep) or absroot == failp:
                    dirs[:] = []
                    continue
                for name in files:
                    p = os.path.join(root, name)
                    if not should_include_file(p, settings):
                        continue
                    existing = get_existing_job_for_source(p)
                    if existing and existing.get("status") in TERMINAL_STATUSES:
                        continue
                    if existing and existing.get("status") in {"pending", "waiting_file_copy", "probing", "converting"}:
                        continue
                    upsert_job(p)
                    count += 1
            last_scan_at = time.time()
            return count
        
        
        def pick_next_job():
            with db_lock:
                conn = db_connect()
                try:
                    row = conn.execute("""
                        SELECT * FROM jobs
                        WHERE status IN ('pending','failed')
                        ORDER BY created_at ASC
                        LIMIT 1
                    """).fetchone()
                    return row_to_dict(row)
                finally:
                    conn.close()
        
        
        def build_ffmpeg_cmd(src, tmp, settings, info, safe=False, no_audio=False):
            max_w = int(settings.get("max_width", 4096))
            max_h = int(settings.get("max_height", 2048))
            too_large = int(info.get("width", 0)) > max_w or int(info.get("height", 0)) > max_h
            cmd = ["ffmpeg", "-nostdin", "-hide_banner", "-y"]
            if safe:
                cmd += ["-fflags", "+genpts+discardcorrupt", "-err_detect", "ignore_err"]
            cmd += ["-i", src]
            if no_audio or settings.get("audio_mode") == "none":
                cmd += ["-map", "0:v:0", "-an"]
            else:
                cmd += ["-map", "0:v:0", "-map", "0:a?"]
            if settings.get("copy_metadata", True) and not safe:
                cmd += ["-map_metadata", "0"]
            else:
                cmd += ["-map_metadata", "-1"]
            if settings.get("copy_chapters", True) and not safe:
                cmd += ["-map_chapters", "0"]
            else:
                cmd += ["-map_chapters", "-1"]
            vf = "format=" + str(settings.get("pixel_format", "yuv420p"))
            if too_large and settings.get("scale_if_too_large", True):
                vf = f"scale='min({max_w},iw)':'min({max_h},ih)':force_original_aspect_ratio=decrease:force_divisible_by=2," + vf
            if safe:
                vf = "fps=30000/1001," + vf
            cmd += ["-vf", vf]
            if safe and not no_audio and settings.get("audio_mode") != "none":
                cmd += ["-af", "aresample=async=1000:first_pts=0"]
            cmd += ["-c:v", str(settings.get("video_encoder", "libx265"))]
            threads = int(settings.get("ffmpeg_threads", 0) or 0)
            if threads > 0:
                cmd += ["-threads", str(threads)]
            cmd += ["-preset", str(settings.get("preset", "medium")), "-crf", str(settings.get("crf", 24)), "-pix_fmt", str(settings.get("pixel_format", "yuv420p"))]
            if not no_audio and settings.get("audio_mode") != "none":
                if settings.get("audio_mode") == "copy" and not safe:
                    cmd += ["-c:a", "copy"]
                else:
                    cmd += ["-c:a", "aac", "-b:a", str(settings.get("audio_bitrate", "160k"))]
            if os.path.splitext(tmp)[1].lower() == ".mp4" and settings.get("faststart", True):
                cmd += ["-movflags", "+faststart"]
            extra = str(settings.get("extra_ffmpeg_args", "")).strip()
            if extra:
                # intentionally simple split; advanced user field
                cmd += extra.split()
            cmd += ["-progress", "pipe:1", "-nostats", tmp]
            return cmd
        
        
        def run_ffmpeg_with_progress(job, cmd, duration):
            global current_process
            start = time.time()
            progress = {"out_time_ms": 0.0, "fps": "", "speed": ""}
            with open(FFMPEG_LOG, "a", encoding="utf-8", errors="replace") as logf:
                logf.write("\n" + "="*80 + "\n")
                logf.write(now_iso() + " JOB " + job["id"] + "\n")
                logf.write("CMD: " + json.dumps(cmd, ensure_ascii=False) + "\n")
                logf.flush()
                proc = subprocess.Popen(cmd, stdout=subprocess.PIPE, stderr=logf, text=True, bufsize=1)
                with worker_control_lock:
                    current_process = proc
                try:
                    assert proc.stdout is not None
                    for line in proc.stdout:
                        line = line.strip()
                        if "=" not in line:
                            continue
                        k, v = line.split("=", 1)
                        if k in progress:
                            progress[k] = v
                        if k == "out_time_ms":
                            try:
                                progress[k] = float(v)
                            except Exception:
                                progress[k] = 0.0
                        if k in {"out_time_ms", "fps", "speed", "progress"}:
                            out_ms = float(progress.get("out_time_ms") or 0)
                            pct = 0.0
                            if duration and duration > 0:
                                pct = min(100.0, (out_ms / 1000000.0) / duration * 100.0)
                            elapsed = time.time() - start
                            eta = 0.0
                            if pct > 0 and pct < 100:
                                eta = elapsed * (100.0 - pct) / pct
                            update_job(job["id"], progress_percent=round(pct, 2), fps=str(progress.get("fps") or ""), speed=str(progress.get("speed") or ""), eta_seconds=round(eta, 1), elapsed_seconds=round(elapsed, 1))
                    rc = proc.wait()
                    return rc, time.time() - start
                finally:
                    with worker_control_lock:
                        current_process = None
        
        
        def remux_mkv_to_mp4(mkv, mp4):
            ensure_parent(mp4)
            tmp = mp4 + ".tmp.mp4"
            cmd = ["ffmpeg", "-nostdin", "-hide_banner", "-y", "-i", mkv, "-map", "0:v:0", "-map", "0:a?", "-c", "copy", "-tag:v", "hvc1", "-movflags", "+faststart", tmp]
            with open(FFMPEG_LOG, "a", encoding="utf-8", errors="replace") as logf:
                logf.write("\nREMUX CMD: " + json.dumps(cmd, ensure_ascii=False) + "\n")
                cp = subprocess.run(cmd, stdout=logf, stderr=logf, text=True)
            if cp.returncode == 0 and is_valid_video(tmp):
                os.replace(tmp, mp4)
                return True, ""
            try:
                os.remove(tmp)
            except Exception:
                pass
            return False, f"remux failed rc={cp.returncode}"
        
        
        def move_to_failed(job, settings, reason):
            src = job["source_path"]
            failed_root = to_container_path(settings.get("failed_path", DEFAULT_SETTINGS["failed_path"]))
            input_path = to_container_path(settings.get("input_path", DEFAULT_SETTINGS["input_path"]))
            rel = safe_rel(src, input_path)
            dst = os.path.join(failed_root, rel)
            try:
                ensure_parent(dst)
                if os.path.exists(src):
                    shutil.move(src, dst)
                update_job(job["id"], status="moved_to_failed", output_path=dst, error_message=reason, finished_at=now_iso())
            except Exception as e:
                update_job(job["id"], status="failed", error_message=f"failed move to quarantine: {e}; original error: {reason}", finished_at=now_iso())
        
        
        def process_job(job):
            settings = load_settings()
            src = job["source_path"]
            if not os.path.exists(src):
                update_job(job["id"], status="skipped", error_message="source no longer exists", finished_at=now_iso())
                return
            update_job(job["id"], status="waiting_file_copy", started_at=now_iso(), progress_percent=0)
            if not file_is_stable(src, settings):
                update_job(job["id"], status="skipped", error_message="source disappeared during stability check", finished_at=now_iso())
                return
            update_job(job["id"], status="probing")
            info, err = get_video_info(src)
            if not info:
                update_job(job["id"], status="skipped", error_message="ffprobe failed: " + err, finished_at=now_iso())
                return
            # Filter by duration and size
            dur = float(info.get("duration") or 0)
            size = int(info.get("size") or 0)
            min_d = float(settings.get("min_duration_seconds", 0) or 0)
            max_d = float(settings.get("max_duration_seconds", 0) or 0)
            min_mb = float(settings.get("min_size_mb", 0) or 0)
            max_mb = float(settings.get("max_size_mb", 0) or 0)
            if min_d and dur < min_d or max_d and dur > max_d or min_mb and size < min_mb*1048576 or max_mb and size > max_mb*1048576:
                update_job(job["id"], status="skipped", source_codec=info["codec"], source_width=info["width"], source_height=info["height"], source_duration=dur, source_size_bytes=size, error_message="filtered out", finished_at=now_iso())
                return
            update_job(job["id"], source_codec=info["codec"], source_width=info["width"], source_height=info["height"], source_duration=dur, source_size_bytes=size)
            codec = info["codec"].lower()
            too_large = info["width"] > int(settings.get("max_width", 4096)) or info["height"] > int(settings.get("max_height", 2048))
            # already hevc and no scale required
            if codec == "hevc" and not too_large:
                action = str(settings.get("hevc_action", "move"))
                dst = os.path.join(to_container_path(settings.get("output_path")), os.path.basename(to_container_path(settings.get("input_path")).rstrip("/")), safe_rel(src, to_container_path(settings.get("input_path")))) if settings.get("preserve_input_folder", True) else os.path.join(to_container_path(settings.get("output_path")), safe_rel(src, to_container_path(settings.get("input_path"))))
                ensure_parent(dst)
                try:
                    if os.path.exists(dst) and is_valid_video(dst):
                        update_job(job["id"], status="skip_ok", output_path=dst, output_size_bytes=os.path.getsize(dst), progress_percent=100, finished_at=now_iso(), mode="already_hevc_exists")
                        return
                    if action == "move":
                        shutil.move(src, dst)
                        status = "moved_already_hevc"
                    elif action == "copy":
                        shutil.copy2(src, dst)
                        status = "copied_already_hevc"
                    elif action == "hardlink":
                        os.link(src, dst)
                        status = "hardlinked_already_hevc"
                    else:
                        update_job(job["id"], status="skipped", output_path="", output_size_bytes=0, progress_percent=100, finished_at=now_iso(), mode="already_hevc_skip")
                        return
                    update_job(job["id"], status=status, output_path=dst, output_size_bytes=os.path.getsize(dst), progress_percent=100, finished_at=now_iso(), mode="already_hevc")
                    return
                except Exception as e:
                    update_job(job["id"], status="failed", error_message=str(e), retry_count=int(job.get("retry_count") or 0)+1, finished_at=now_iso())
                    return
            process_codecs = split_csv(settings.get("process_codecs"))
            if codec not in process_codecs and "unknown" not in process_codecs:
                update_job(job["id"], status="skipped", error_message="codec not selected: " + codec, finished_at=now_iso())
                return
            dst = compute_output_path(src, settings, info)
            tmp = temp_for_output(dst, settings)
            ensure_parent(dst)
            ensure_parent(tmp)
            if os.path.exists(dst) and is_valid_video(dst):
                update_job(job["id"], status="skip_ok", output_path=dst, output_size_bytes=os.path.getsize(dst), progress_percent=100, finished_at=now_iso(), mode="output_exists")
                return
            try:
                os.remove(tmp)
            except Exception:
                pass
            update_job(job["id"], status="converting", output_path=dst, temp_path=tmp, progress_percent=0, error_message="", mode="normal")
            cmd = build_ffmpeg_cmd(src, tmp, settings, info, safe=False)
            rc, elapsed = run_ffmpeg_with_progress(job, cmd, dur)
            if rc == 0 and is_valid_video(tmp):
                os.replace(tmp, dst)
                out_size = os.path.getsize(dst)
                if settings.get("delete_source_after_success", False):
                    try:
                        os.remove(src)
                    except Exception as e:
                        log_app(f"delete_source_failed {src} {e}")
                update_job(job["id"], status="success", output_size_bytes=out_size, progress_percent=100, elapsed_seconds=round(elapsed,1), finished_at=now_iso(), mode="normal")
                return
            try:
                os.remove(tmp)
            except Exception:
                pass
            # Safe retry: make MKV, then remux to MP4
            if settings.get("auto_safe_retry", True):
                safe_mkv = os.path.splitext(dst)[0] + "_SAFE_TMP.mkv"
                try:
                    os.remove(safe_mkv)
                except Exception:
                    pass
                update_job(job["id"], status="converting", progress_percent=0, mode="safe_mkv", error_message="normal failed, trying safe mkv")
                cmd2 = build_ffmpeg_cmd(src, safe_mkv, settings, info, safe=True)
                rc2, elapsed2 = run_ffmpeg_with_progress(job, cmd2, dur)
                if rc2 == 0 and is_valid_video(safe_mkv):
                    final_ok = False
                    if settings.get("safe_remux_to_mp4", True) and os.path.splitext(dst)[1].lower() == ".mp4":
                        ok, remux_err = remux_mkv_to_mp4(safe_mkv, dst)
                        if ok:
                            final_ok = True
                            try:
                                os.remove(safe_mkv)
                            except Exception:
                                pass
                        else:
                            log_app(remux_err)
                    if not final_ok and settings.get("allow_mkv_fallback", False):
                        dst_mkv = os.path.splitext(dst)[0] + ".mkv"
                        os.replace(safe_mkv, dst_mkv)
                        dst = dst_mkv
                        final_ok = True
                    if final_ok and is_valid_video(dst):
                        out_size = os.path.getsize(dst)
                        if settings.get("delete_source_after_success", False):
                            try:
                                os.remove(src)
                            except Exception as e:
                                log_app(f"delete_source_failed {src} {e}")
                        update_job(job["id"], status="success", output_path=dst, output_size_bytes=out_size, progress_percent=100, elapsed_seconds=round(elapsed+elapsed2,1), finished_at=now_iso(), mode="safe_fixed")
                        return
                    try:
                        os.remove(safe_mkv)
                    except Exception:
                        pass
            retry = int(job.get("retry_count") or 0) + 1
            update_job(job["id"], status="failed", retry_count=retry, error_message=f"ffmpeg failed rc={rc}", elapsed_seconds=round(elapsed,1), finished_at=now_iso())
            if retry >= int(settings.get("max_retries", 1)) and settings.get("move_failed_after_retries", True):
                job2 = get_job(job["id"])
                move_to_failed(job2, settings, f"ffmpeg failed after {retry} attempts")
        
        
        def worker_loop():
            global last_worker_error
            log_app("worker_loop_started")
            while not shutdown_event.is_set():
                try:
                    settings = load_settings()
                    if not settings.get("worker_enabled", True) or not settings.get("auto_convert_enabled", True):
                        time.sleep(2)
                        continue
                    scan_files()
                    job = pick_next_job()
                    if job:
                        process_job(job)
                    else:
                        time.sleep(max(2, int(settings.get("scan_interval_seconds", 30))))
                except Exception as e:
                    last_worker_error = str(e)
                    log_app("worker_error " + repr(e))
                    time.sleep(5)
        
        
        def fmt_bytes(n):
            try:
                n = float(n)
            except Exception:
                n = 0
            units = ["B", "KB", "MB", "GB", "TB"]
            i = 0
            while n >= 1024 and i < len(units)-1:
                n /= 1024.0
                i += 1
            if i == 0:
                return f"{int(n)}{units[i]}"
            return f"{n:.1f}{units[i]}"
        
        
        def stats_payload():
            with db_lock:
                conn = db_connect()
                try:
                    rows = conn.execute("SELECT * FROM jobs").fetchall()
                finally:
                    conn.close()
            total = len(rows)
            done = 0
            pending = 0
            failed = 0
            converting = 0
            orig = 0
            out = 0
            elapsed = 0
            current = None
            status_counts = {}
            for r in rows:
                st = r["status"]
                status_counts[st] = status_counts.get(st, 0) + 1
                if st in SUCCESS_STATUSES:
                    done += 1
                    orig += int(r["source_size_bytes"] or 0)
                    out += int(r["output_size_bytes"] or 0)
                    elapsed += float(r["elapsed_seconds"] or 0)
                elif st in {"pending", "waiting_file_copy", "probing"}:
                    pending += 1
                elif st == "converting":
                    converting += 1
                    current = row_to_dict(r)
                elif st in {"failed", "moved_to_failed"}:
                    failed += 1
            active_job = current
            saved = max(0, orig - out)
            pct = (saved / orig * 100) if orig else 0
            return {
                "version": APP_VERSION,
                "worker_enabled": load_settings().get("worker_enabled"),
                "auto_convert_enabled": load_settings().get("auto_convert_enabled"),
                "total": total,
                "done": done,
                "pending": pending,
                "failed": failed,
                "converting": converting,
                "progress_percent": round(done / total * 100, 2) if total else 100.0,
                "source_bytes": orig,
                "output_bytes": out,
                "saved_bytes": saved,
                "saved_percent": round(pct, 2),
                "source_h": fmt_bytes(orig),
                "output_h": fmt_bytes(out),
                "saved_h": fmt_bytes(saved),
                "elapsed_seconds": elapsed,
                "elapsed_h": "%02d:%02d:%02d" % (int(elapsed)//3600, (int(elapsed)%3600)//60, int(elapsed)%60),
                "current": active_job,
                "status_counts": status_counts,
                "last_scan_at": last_scan_at,
                "worker_uptime_seconds": time.time() - worker_started_at,
                "last_worker_error": last_worker_error
            }
        
        INDEX_HTML = r"""
        <!doctype html>
        <html lang="ru">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>Auto H265 Converter</title>
          <style>
            :root{--bg:#081114;--panel:#111c20;--panel2:#16262b;--text:#e8f2f2;--muted:#96a6a8;--cyan:#22d3ee;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--border:#26373d;--blue:#60a5fa}
            *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#12343b,#081114 40%);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--text)}
            header{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,17,20,.72);backdrop-filter: blur(8px);position:sticky;top:0;z-index:5}
            h1{font-size:22px;margin:0}.tag{font-size:12px;color:var(--muted)}
            main{padding:24px;max-width:1500px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.card{background:linear-gradient(180deg,var(--panel),#0d171a);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
            .card h3{margin:0 0 10px;color:var(--muted);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.08em}.big{font-size:30px;font-weight:800}.small{font-size:13px;color:var(--muted)}
            .ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--yellow)}.blue{color:var(--blue)}.cyan{color:var(--cyan)}
            .bar{height:12px;background:#071013;border:1px solid var(--border);border-radius:999px;overflow:hidden}.bar>div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));width:0%}
            .section{margin-top:18px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:9px 13px;cursor:pointer;font-weight:700}.btn:hover{border-color:var(--cyan)}.btn.green{background:#0f2d1b;border-color:#166534}.btn.red{background:#321316;border-color:#7f1d1d}.btn.yellow{background:#2f250c;border-color:#854d0e}
            input,select,textarea{width:100%;background:#071013;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px}label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}.formgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.span2{grid-column:span 2}.span4{grid-column:span 4}
            table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}th{text-align:left;color:var(--muted);font-size:12px}td.path{max-width:480px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pill{padding:3px 8px;border-radius:999px;background:#102126;border:1px solid var(--border);font-size:12px}.tabs{display:flex;gap:10px;margin-bottom:14px}.hidden{display:none}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.log{white-space:pre-wrap;background:#071013;border:1px solid var(--border);border-radius:12px;padding:12px;max-height:420px;overflow:auto;color:#cbd5e1}
            @media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}.formgrid{grid-template-columns:1fr}.span2,.span4{grid-column:span 1}}@media(max-width:640px){.grid{grid-template-columns:1fr}main{padding:14px}header{padding:16px}}
          </style>
        </head>
        <body>
        <header><div><h1>Auto H265 Converter</h1><div class="tag">Umbrel video converter · H.264 → H.265 · live progress</div></div><div class="row"><button class="btn" onclick="showTab('dashboard')">Dashboard</button><button class="btn" onclick="showTab('settings')">Settings</button><button class="btn" onclick="showTab('jobs')">Queue</button><button class="btn" onclick="showTab('logs')">Logs</button></div></header>
        <main>
          <section id="dashboard">
            <div class="grid">
              <div class="card"><h3>Общий прогресс</h3><div class="big" id="progressText">0 / 0</div><div class="bar"><div id="progressBar"></div></div><div class="small" id="progressPercent">0%</div></div>
              <div class="card"><h3>Экономия</h3><div class="big ok" id="savedText">0B</div><div class="small" id="savedPercent">0%</div></div>
              <div class="card"><h3>Объём</h3><div class="big" id="volumeText">0B → 0B</div><div class="small">исходники → результат</div></div>
              <div class="card"><h3>Ошибки</h3><div class="big" id="failedText">0</div><div class="small" id="serviceText">service</div></div>
            </div>
            <div class="card section"><h3>Текущий файл</h3><div id="currentBox" class="small">IDLE</div><div class="bar" style="margin-top:12px"><div id="currentBar"></div></div></div>
            <div class="card section"><h3>Управление</h3><div class="row"><button class="btn green" onclick="apiPost('/api/worker/resume')">Resume auto</button><button class="btn yellow" onclick="apiPost('/api/worker/pause')">Pause auto</button><button class="btn" onclick="apiPost('/api/scan')">Scan now</button><button class="btn red" onclick="apiPost('/api/worker/stop-current')">Stop current ffmpeg</button></div></div>
          </section>
          <section id="settings" class="hidden">
            <div class="card"><h3>Настройки</h3><div class="formgrid" id="settingsForm"></div><div class="row" style="margin-top:14px"><button class="btn green" onclick="saveSettings()">Save settings</button><button class="btn" onclick="loadSettings()">Reload</button></div></div>
          </section>
          <section id="jobs" class="hidden"><div class="card"><h3>Очередь</h3><div class="row"><button class="btn" onclick="loadJobs()">Refresh</button><select id="jobStatus" style="max-width:220px" onchange="loadJobs()"><option value="">all</option><option>pending</option><option>converting</option><option>success</option><option>failed</option><option>moved_to_failed</option><option>skipped</option></select></div><div style="overflow:auto;margin-top:12px"><table><thead><tr><th>Status</th><th>Progress</th><th>Source</th><th>Output</th><th>Size</th><th>Error</th><th>Actions</th></tr></thead><tbody id="jobsBody"></tbody></table></div></div></section>
          <section id="logs" class="hidden"><div class="card"><h3>Логи</h3><div class="row"><button class="btn" onclick="loadLogs('app')">App log</button><button class="btn" onclick="loadLogs('ffmpeg')">FFmpeg log</button></div><div class="log mono" id="logBox">...</div></div></section>
        </main>
        <script>
        let settingsCache = {};
        function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
        async function getJson(url){const r=await fetch(url);return await r.json();}
        async function postJson(url,obj){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj||{})});return await r.json();}
        async function apiPost(url){await postJson(url,{}); refresh();}
        function showTab(id){['dashboard','settings','jobs','logs'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==id)); if(id==='settings')loadSettings(); if(id==='jobs')loadJobs(); if(id==='logs')loadLogs('app');}
        function fmtPath(p){return esc(p||'');}
        async function refresh(){
         const s=await getJson('/api/stats');
         document.getElementById('progressText').textContent=s.done+' / '+s.total;
         document.getElementById('progressPercent').textContent=s.progress_percent+'%';
         document.getElementById('progressBar').style.width=s.progress_percent+'%';
         document.getElementById('savedText').textContent=s.saved_h;
         document.getElementById('savedPercent').textContent=s.saved_percent+'% · '+s.elapsed_h;
         document.getElementById('volumeText').textContent=s.source_h+' → '+s.output_h;
         document.getElementById('failedText').textContent=s.failed;
         document.getElementById('serviceText').textContent='auto: '+(s.auto_convert_enabled?'ON':'OFF')+' · worker: '+(s.worker_enabled?'ON':'OFF');
         let c=s.current;
         if(c){document.getElementById('currentBox').innerHTML='<div class="mono">'+fmtPath(c.source_path)+'</div><div>status: '+esc(c.status)+' · '+(c.progress_percent||0)+'% · fps '+esc(c.fps||'')+' · speed '+esc(c.speed||'')+'</div><div class="mono">out: '+fmtPath(c.output_path)+'</div>';document.getElementById('currentBar').style.width=(c.progress_percent||0)+'%';}
         else{document.getElementById('currentBox').textContent='IDLE';document.getElementById('currentBar').style.width='0%';}
        }
        const fields=[
         ['input_path','Input path','text','span2'],['output_path','Output path','text','span2'],['failed_path','Failed path','text','span2'],['temp_path','Temp path','text','span2'],
         ['auto_convert_enabled','Auto convert','checkbox',''],['worker_enabled','Worker enabled','checkbox',''],['use_temp_path','Use temp path','checkbox',''],['preserve_input_folder','Preserve input folder name','checkbox',''],
         ['allowed_extensions','Extensions','text','span2'],['process_codecs','Process codecs','text','span2'],['hevc_action','HEVC action','select',''],['container','Container','select',''],
         ['max_width','Max width','number',''],['max_height','Max height','number',''],['crf','CRF','number',''],['preset','Preset','select',''],
         ['audio_mode','Audio mode','select',''],['audio_bitrate','Audio bitrate','text',''],['ffmpeg_threads','FFmpeg threads','number',''],['max_retries','Max retries','number',''],
         ['scan_interval_seconds','Scan sec','number',''],['stable_check_seconds','Stable check sec','number',''],['stable_check_count','Stable checks','number',''],['delete_source_after_success','Delete source after success','checkbox',''],
         ['auto_safe_retry','Auto safe retry','checkbox',''],['safe_remux_to_mp4','Safe remux to MP4','checkbox',''],['allow_mkv_fallback','Allow MKV fallback','checkbox',''],['extra_ffmpeg_args','Extra FFmpeg args','text','span2']
        ];
        function inputHtml(k,label,type,cls){let v=settingsCache[k];let div='<div class="'+(cls||'')+'"><label>'+label+'</label>'; if(type==='checkbox'){div+='<select id="set_'+k+'"><option value="true">true</option><option value="false">false</option></select>';}else if(type==='select'){let opts=[]; if(k==='hevc_action')opts=['move','copy','hardlink','skip']; else if(k==='container')opts=['mp4','mkv']; else if(k==='preset')opts=['ultrafast','superfast','veryfast','faster','fast','medium','slow','slower','veryslow']; else if(k==='audio_mode')opts=['aac','copy','none']; div+='<select id="set_'+k+'">'+opts.map(o=>'<option>'+o+'</option>').join('')+'</select>';}else{div+='<input id="set_'+k+'" type="'+type+'">';} div+='</div>'; return div;}
        async function loadSettings(){settingsCache=await getJson('/api/settings');document.getElementById('settingsForm').innerHTML=fields.map(f=>inputHtml(f[0],f[1],f[2],f[3])).join('');fields.forEach(f=>{let el=document.getElementById('set_'+f[0]); if(el){el.value=String(settingsCache[f[0]]);}});}
        async function saveSettings(){let obj={};fields.forEach(f=>{let el=document.getElementById('set_'+f[0]); if(!el)return; let val=el.value; if(f[2]==='number')val=Number(val); if(f[2]==='checkbox')val=(val==='true'); obj[f[0]]=val;});await postJson('/api/settings',obj);await loadSettings();alert('saved');}
        async function loadJobs(){let st=document.getElementById('jobStatus').value;let data=await getJson('/api/jobs?limit=500'+(st?'&status='+encodeURIComponent(st):''));document.getElementById('jobsBody').innerHTML=data.jobs.map(j=>'<tr><td><span class="pill">'+esc(j.status)+'</span></td><td>'+esc(j.progress_percent||0)+'%</td><td class="path mono">'+fmtPath(j.source_path)+'</td><td class="path mono">'+fmtPath(j.output_path)+'</td><td>'+esc(j.source_size_h)+' → '+esc(j.output_size_h)+'</td><td class="path">'+esc(j.error_message||'')+'</td><td><button class="btn" onclick="retryJob(\''+j.id+'\')">retry</button> <button class="btn yellow" onclick="moveFailed(\''+j.id+'\')">failed</button></td></tr>').join('');}
        async function retryJob(id){await postJson('/api/jobs/'+id+'/retry',{});loadJobs();}
        async function moveFailed(id){await postJson('/api/jobs/'+id+'/move-to-failed',{});loadJobs();}
        async function loadLogs(kind){let d=await getJson('/api/logs?kind='+kind+'&lines=300');document.getElementById('logBox').textContent=d.text||'';}
        setInterval(refresh,2000); refresh();
        </script>
        </body>
        </html>
        """
        
        class Handler(BaseHTTPRequestHandler):
            server_version = "AutoH265/" + APP_VERSION
            def log_message(self, fmt, *args):
                return
            def send_json(self, obj, status=200):
                data = json.dumps(obj, ensure_ascii=False).encode("utf-8")
                self.send_response(status)
                self.send_header("Content-Type", "application/json; charset=utf-8")
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
            def read_json(self):
                length = int(self.headers.get("Content-Length", "0") or 0)
                if length <= 0:
                    return {}
                raw = self.rfile.read(length).decode("utf-8")
                try:
                    return json.loads(raw)
                except Exception:
                    return {}
            def do_GET(self):
                parsed = urlparse(self.path)
                path = parsed.path
                qs = parse_qs(parsed.query)
                if path == "/" or path == "/index.html":
                    data = INDEX_HTML.encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html; charset=utf-8")
                    self.send_header("Content-Length", str(len(data)))
                    self.end_headers()
                    self.wfile.write(data)
                    return
                if path == "/api/health":
                    self.send_json({"ok": True, "version": APP_VERSION})
                    return
                if path == "/api/settings":
                    self.send_json(load_settings())
                    return
                if path == "/api/stats":
                    self.send_json(stats_payload())
                    return
                if path == "/api/jobs":
                    limit = int(qs.get("limit", [300])[0] or 300)
                    status = qs.get("status", [""])[0] or None
                    jobs = list_jobs(limit=limit, status=status)
                    for j in jobs:
                        j["source_size_h"] = fmt_bytes(j.get("source_size_bytes") or 0)
                        j["output_size_h"] = fmt_bytes(j.get("output_size_bytes") or 0)
                    self.send_json({"jobs": jobs})
                    return
                if path == "/api/logs":
                    kind = qs.get("kind", ["app"])[0]
                    lines = int(qs.get("lines", [200])[0] or 200)
                    file = FFMPEG_LOG if kind == "ffmpeg" else APP_LOG
                    text = ""
                    try:
                        with open(file, "r", encoding="utf-8", errors="replace") as f:
                            arr = f.readlines()[-lines:]
                        text = "".join(arr)
                    except Exception as e:
                        text = str(e)
                    self.send_json({"text": text})
                    return
                self.send_json({"error": "not found"}, 404)
            def do_POST(self):
                parsed = urlparse(self.path)
                path = parsed.path
                body = self.read_json()
                if path == "/api/settings":
                    self.send_json(save_settings(body))
                    return
                if path == "/api/scan":
                    n = scan_files()
                    self.send_json({"ok": True, "added": n})
                    return
                if path == "/api/worker/pause":
                    s = load_settings(); s["auto_convert_enabled"] = False; save_settings(s); self.send_json({"ok": True}) ; return
                if path == "/api/worker/resume":
                    s = load_settings(); s["auto_convert_enabled"] = True; s["worker_enabled"] = True; save_settings(s); self.send_json({"ok": True}) ; return
                if path == "/api/worker/stop-current":
                    with worker_control_lock:
                        p = current_process
                    if p and p.poll() is None:
                        try:
                            p.terminate()
                            self.send_json({"ok": True, "terminated": True})
                            return
                        except Exception as e:
                            self.send_json({"ok": False, "error": str(e)}, 500)
                            return
                    self.send_json({"ok": True, "terminated": False})
                    return
                m = re.match(r"^/api/jobs/([^/]+)/retry$$", path)
                if m:
                    jid = m.group(1); update_job(jid, status="pending", retry_count=0, error_message="", progress_percent=0); self.send_json({"ok": True}); return
                m = re.match(r"^/api/jobs/([^/]+)/move-to-failed$$", path)
                if m:
                    jid = m.group(1); job = get_job(jid)
                    if job:
                        move_to_failed(job, load_settings(), "manual move to failed")
                        self.send_json({"ok": True})
                    else:
                        self.send_json({"ok": False, "error": "job not found"}, 404)
                    return
                self.send_json({"error": "not found"}, 404)
        
        
        def handle_signal(signum, frame):
            shutdown_event.set()
            with worker_control_lock:
                p = current_process
            if p and p.poll() is None:
                try:
                    p.terminate()
                except Exception:
                    pass
        
        
        def main():
            init_db()
            if not os.path.exists(SETTINGS_PATH):
                save_settings(DEFAULT_SETTINGS)
            signal.signal(signal.SIGTERM, handle_signal)
            signal.signal(signal.SIGINT, handle_signal)
            t = threading.Thread(target=worker_loop, daemon=True)
            t.start()
            port = int(os.environ.get("APP_PORT", "8080"))
            httpd = ThreadingHTTPServer(("0.0.0.0", port), Handler)
            log_app(f"server_started port={port}")
            try:
                httpd.serve_forever()
            finally:
                shutdown_event.set()
                httpd.server_close()
        
        if __name__ == "__main__":
            main()
        PY
        exec python3 /tmp/server.py
