<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto H265 Video Converter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>Auto H265 Video Converter</h1>
      <div class="actions">
        <button data-action="start">Start</button>
        <button data-action="stop">Stop</button>
        <button data-action="pause">Pause</button>
        <button data-action="resume">Resume</button>
        <button id="scan-now">Scan now</button>
      </div>
    </header>

    <main>
      <section class="grid">
        <div class="card">
          <span>Status</span>
          <strong id="service-status">Loading</strong>
        </div>
        <div class="card">
          <span>Current file</span>
          <strong id="current-file">-</strong>
        </div>
        <div class="card">
          <span>Progress</span>
          <strong id="current-progress">0%</strong>
        </div>
        <div class="card">
          <span>Queue</span>
          <strong id="queue-count">0 / 0</strong>
        </div>
        <div class="card">
          <span>Saved</span>
          <strong id="saved">0 B</strong>
        </div>
        <div class="card">
          <span>Errors</span>
          <strong id="errors">0</strong>
        </div>
      </section>

      <section>
        <h2>Settings</h2>
        <form id="settings-form" class="settings">
          <label>Input path <input name="input_path" /></label>
          <label>Output path <input name="output_path" /></label>
          <label>Failed path <input name="failed_path" /></label>
          <label>Temp path <input name="temp_path" /></label>
          <label>CRF <input name="crf" type="number" min="18" max="32" /></label>
          <label>Preset <input name="preset" /></label>
          <label>Max width <input name="max_width" type="number" /></label>
          <label>Max height <input name="max_height" type="number" /></label>
          <label>Scan interval <input name="scan_interval_seconds" type="number" min="1" /></label>
          <label>FFmpeg threads <input name="ffmpeg_threads" type="number" min="0" /></label>
          <label class="check"><input name="use_temp_path" type="checkbox" /> Use temp path</label>
          <label class="check"><input name="recursive_scan" type="checkbox" /> Recursive scan</label>
          <label class="check"><input name="auto_convert_enabled" type="checkbox" /> Auto convert</label>
          <button type="submit">Save settings</button>
        </form>
      </section>

      <section>
        <h2>Queue</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>File</th>
              <th>Status</th>
              <th>Codec</th>
              <th>Size</th>
              <th>Progress</th>
              <th>FPS</th>
              <th>Speed</th>
              <th>Error</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="jobs"></tbody>
        </table>
      </section>

      <section>
        <h2>Logs</h2>
        <pre id="logs"></pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
