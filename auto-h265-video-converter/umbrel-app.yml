manifestVersion: 1
id: auto-h265-video-converter
category: files
name: Auto H265 Video Converter
version: "0.1.0"
tagline: Automatically convert H.264 videos to H.265
description: >-
  A minimal web app for Umbrel OS that watches a mounted media folder,
  queues video files, and converts them one at a time to HEVC/H.265 with
  FFmpeg. The MVP includes a simple dashboard, queue, settings, logs,
  SQLite history, live progress, and quarantine handling for failed files.
