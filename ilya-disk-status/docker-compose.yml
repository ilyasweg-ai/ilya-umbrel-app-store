        </head>
        <body>
        <div class="wrap">
          <h1>Disk Status</h1>
          <div class="sub">Системный раздел, реальные внешние диски и сетевые mount-диски. История и I/O пишутся каждую секунду. Карточки обновляются каждые 5 секунд.</div>
          <div class="toolbar" id="filters"></div>
