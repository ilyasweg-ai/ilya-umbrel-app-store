        .overlay{position:fixed;inset:0;background:rgba(2,6,23,.82);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
        .modal{width:min(1180px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid #334155;border-radius:22px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.55)}
