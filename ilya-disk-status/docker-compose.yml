services:
  app_proxy:
    environment:
      APP_HOST: ilya-disk-status_server_1
      APP_PORT: 8080

  server:
    image: python:3.12-alpine
    restart: on-failure
    pid: host
    volumes:
      - /:/hostroot:ro,rslave
      - ${UMBREL_ROOT}:/umbrel-root:ro
      - ${UMBREL_ROOT}/app-data/ilya-disk-status/data:/data
    command:
      - sh
      - -c
      - |
        cat > /tmp/server.py <<'PY'
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
        from urllib.parse import urlparse, parse_qs, unquote
        import json
        import os
        import re
        import sqlite3
        import threading
        import time
        import uuid

        APP_VERSION = "1.6.4"
        HOSTROOT = "/hostroot"
        SYSTEM_PATH = "/umbrel-root"
        HOST_UMBREL_ROOT = "${UMBREL_ROOT}".rstrip("/")
        HOST_EXTERNAL_ROOT = HOST_UMBREL_ROOT + "/external"

        DATA_DIR = "/data"
        DB_PATH = DATA_DIR + "/history.sqlite"

        # Tiered history:
        # raw samples: every 1 sec, keep 24 hours
        # 10 sec samples: keep 7 days
        # 60 sec samples: keep 30 days
        SAMPLE_INTERVAL_SEC = 1
        RAW_KEEP_SEC = 24 * 3600
        TIER10_KEEP_SEC = 7 * 24 * 3600
        TIER60_KEEP_SEC = 30 * 24 * 3600
        COMPACT_INTERVAL_SEC = 60
        DEFAULT_TOP_SCAN_TIMEOUT_SEC = 25

        NETWORK_FS_TYPES = {
            "cifs", "smb3", "nfs", "nfs4", "fuse.sshfs", "sshfs",
            "fuse.rclone", "rclone", "davfs", "fuse.davfs", "fuse.webdav",
            "9p", "virtiofs"
        }

        SKIP_PREFIXES = (
            "/proc", "/sys", "/dev", "/run", "/tmp", "/boot",
            "/var/lib/docker", "/var/lib/containerd",
            "/data/docker", "/data/data/docker", "/data/data/volumes"
        )

        db_lock = threading.Lock()
        jobs_lock = threading.Lock()
        cache_lock = threading.Lock()
        io_lock = threading.Lock()

        top_jobs = {}
        last_sample_ts = 0
        last_compact_ts = 0
        latest_payload = None
        prev_io_states = {}
        io_window_states = {}
        prev_fs_states = {}
        fs_window_states = {}
        IO_SMOOTH_WINDOW_SEC = 8


        def now_ts():
            return int(time.time())


        def decode_path(value):
            return (
                value
                .replace("\\040", " ")
                .replace("\\011", "\t")
                .replace("\\012", "\n")
                .replace("\\134", "\\")
            )


        def is_under(path, parent):
            parent = parent.rstrip("/")
            return path == parent or path.startswith(parent + "/")


        def container_path(host_path):
            return HOSTROOT if host_path == "/" else HOSTROOT + host_path


        def gib(value):
            return round(value / 1073741824, 1)


        def mib(value):
            return round(value / 1048576, 2)


        def disk_key(kind, host_path, source=""):
            raw = kind + "|" + host_path + "|" + source
            return re.sub(r"[^a-zA-Z0-9_.-]+", "_", raw).strip("_")[:180]


        def parse_mountinfo(path):
            out = []
            try:
                with open(path, "r", encoding="utf-8") as f:
                    for line in f:
                        parts = line.strip().split()
                        if len(parts) < 10 or "-" not in parts:
                            continue
                        sep = parts.index("-")
                        mount_point = decode_path(parts[4])
                        fs_type = parts[sep + 1] if len(parts) > sep + 1 else ""
                        source = decode_path(parts[sep + 2]) if len(parts) > sep + 2 else ""
                        out.append({
                            "mount_point": mount_point,
                            "fs_type": fs_type,
                            "source": source,
                        })
            except Exception:
                pass
            return out


        def host_mounts():
            mounts = parse_mountinfo("/proc/1/mountinfo")
            if not mounts:
                mounts = parse_mountinfo("/proc/self/mountinfo")
            return mounts


        def find_mount_for_path(mounts, host_path):
            best = None
            for mount in mounts:
                mp = mount.get("mount_point", "")
                if not mp:
                    continue
                if is_under(host_path, mp):
                    if best is None or len(mp) > len(best.get("mount_point", "")):
                        best = mount
            return best or {}


        def is_network_mount(mount):
            fs_type = mount.get("fs_type", "")
            source = mount.get("source", "")
            mount_point = mount.get("mount_point", "")

            if not mount_point or mount_point == "/":
                return False

            for prefix in SKIP_PREFIXES:
                if is_under(mount_point, prefix):
                    return False

            if fs_type in NETWORK_FS_TYPES:
                return True

            if fs_type.startswith("fuse.") and any(x in fs_type for x in ("rclone", "sshfs", "dav", "webdav")):
                return True

            if source.startswith("//"):
                return True

            if ":" in source and fs_type in ("nfs", "nfs4", "fuse.sshfs", "sshfs"):
                return True

            return False


        def name_from_path(path):
            base = os.path.basename(path.rstrip("/")) or path
            return re.sub(r"\s+\(\d+\)$", "", base)


        def stat_card(name, host_path, kind, source="", fs_type=""):
            path = container_path(host_path)
            st_path = os.stat(path)
            st = os.statvfs(path)

            total = st.f_blocks * st.f_frsize
            free = st.f_bavail * st.f_frsize
            used = total - free
            percent = round((used / total) * 100, 1) if total else 0

            key = disk_key(kind, host_path, source or fs_type or name)

            return {
                "key": key,
                "name": name,
                "kind": kind,
                "host_path": host_path,
                "path": path,
                "source": source,
                "fs_type": fs_type,
                "mounted": True,
                "device_id": st_path.st_dev,
                "total_bytes": total,
                "used_bytes": used,
                "free_bytes": free,
                "total_gb": gib(total),
                "used_gb": gib(used),
                "free_gb": gib(free),
                "percent": percent,
            }


        def add_unique(cards, seen_host_paths, seen_signatures, card):
            host_path = card.get("host_path", "")
            signature = (
                card.get("kind", ""),
                card.get("source", ""),
                card.get("fs_type", ""),
                card.get("device_id", ""),
            )

            if host_path and host_path in seen_host_paths:
                return

            if card.get("kind") in ("external", "network") and signature in seen_signatures:
                return

            cards.append(card)

            if host_path:
                seen_host_paths.add(host_path)

            if card.get("kind") in ("external", "network"):
                seen_signatures.add(signature)


        def external_mounts(mounts):
            result = []
            for mount in mounts:
                mount_point = mount.get("mount_point", "")
                if not mount_point:
                    continue
                if mount_point == HOST_EXTERNAL_ROOT:
                    continue
                if is_under(mount_point, HOST_EXTERNAL_ROOT):
                    result.append(mount)

            result.sort(key=lambda x: x.get("mount_point", ""))
            return result


        def visible_external_mounts(mounts):
            result = []
            for mount in external_mounts(mounts):
                if is_network_mount(mount):
                    continue
                mount_point = mount["mount_point"]
                path = container_path(mount_point)
                if not os.path.ismount(path):
                    continue
                result.append(mount)
            return result


        def hidden_external_folders(mounts):
            hidden = []
            mounted_paths = set(m["mount_point"] for m in external_mounts(mounts))
            ext_container = container_path(HOST_EXTERNAL_ROOT)

            try:
                if os.path.isdir(ext_container):
                    for name in sorted(os.listdir(ext_container)):
                        host_path = HOST_EXTERNAL_ROOT + "/" + name
                        path = os.path.join(ext_container, name)

                        if os.path.isdir(path) and host_path not in mounted_paths:
                            hidden.append({
                                "name": name,
                                "host_path": host_path,
                            })
            except Exception:
                pass

            return hidden


        def read_diskstats():
            stats = {}
            try:
                with open("/proc/diskstats", "r", encoding="utf-8") as f:
                    for line in f:
                        parts = line.split()
                        if len(parts) < 14:
                            continue

                        name = parts[2]

                        try:
                            reads = int(parts[3])
                            sectors_read = int(parts[5])
                            writes = int(parts[7])
                            sectors_written = int(parts[9])
                            io_ms = int(parts[12])
                        except Exception:
                            continue

                        stats[name] = {
                            "reads": reads,
                            "writes": writes,
                            "read_bytes": sectors_read * 512,
                            "write_bytes": sectors_written * 512,
                            "io_ms": io_ms,
                        }
            except Exception:
                pass
            return stats


        def source_to_device_name(source):
            if not source or not source.startswith("/dev/"):
                return ""

            if source.startswith("/dev/mapper/"):
                try:
                    real = os.path.realpath(HOSTROOT + source)
                    base = os.path.basename(real)
                    if base:
                        return base
                except Exception:
                    pass

            return os.path.basename(source)


        def compute_io_rates(reader="sampler"):
            current = read_diskstats()
            ts = time.time()
            rates = {}

            with io_lock:
                state = prev_io_states.get(reader, {})
                prev_diskstats = state.get("stats")
                prev_diskstats_ts = state.get("ts")

                if prev_diskstats and prev_diskstats_ts:
                    dt = max(0.001, ts - prev_diskstats_ts)

                    reader_windows = io_window_states.setdefault(reader, {})

                    for dev, cur in current.items():
                        prev = prev_diskstats.get(dev)
                        if not prev:
                            continue

                        read_delta = max(0, cur["read_bytes"] - prev.get("read_bytes", 0))
                        write_delta = max(0, cur["write_bytes"] - prev.get("write_bytes", 0))
                        reads_delta = max(0, cur["reads"] - prev.get("reads", 0))
                        writes_delta = max(0, cur["writes"] - prev.get("writes", 0))
                        io_ms_delta = max(0, cur["io_ms"] - prev.get("io_ms", 0))

                        raw = {
                            "read_mbps": read_delta / dt / 1048576,
                            "write_mbps": write_delta / dt / 1048576,
                            "read_iops": reads_delta / dt,
                            "write_iops": writes_delta / dt,
                            "io_util_percent": min(100, io_ms_delta / (dt * 10)),
                        }

                        window = reader_windows.setdefault(dev, [])
                        window.append((ts, raw))
                        cutoff = ts - IO_SMOOTH_WINDOW_SEC
                        while window and window[0][0] < cutoff:
                            window.pop(0)

                        def avg(metric):
                            if not window:
                                return 0
                            return sum(item[1].get(metric, 0) for item in window) / len(window)

                        rates[dev] = {
                            "io_device": dev,
                            "io_available": True,

                            # Smoothed values shown in UI and written to history.
                            "read_mbps": round(avg("read_mbps"), 3),
                            "write_mbps": round(avg("write_mbps"), 3),
                            "read_iops": round(avg("read_iops"), 1),
                            "write_iops": round(avg("write_iops"), 1),
                            "io_util_percent": round(avg("io_util_percent"), 1),

                            # Raw values kept for diagnostics/future UI if needed.
                            "raw_read_mbps": round(raw["read_mbps"], 3),
                            "raw_write_mbps": round(raw["write_mbps"], 3),
                            "raw_io_util_percent": round(raw["io_util_percent"], 1),

                            "interval_sec": round(dt, 3),
                            "smooth_window_sec": IO_SMOOTH_WINDOW_SEC,
                            "smooth_samples": len(window),
                        }

                prev_io_states[reader] = {"stats": current, "ts": ts}

            return rates


        def compute_fs_growth_rates(cards, reader="sampler"):
            ts = time.time()
            rates = {}

            with io_lock:
                prev = prev_fs_states.get(reader, {})
                windows = fs_window_states.setdefault(reader, {})

                for card in cards:
                    key = card.get("key")
                    if not key or not card.get("mounted") or card.get("error"):
                        continue

                    used_bytes = card.get("used_bytes")
                    if used_bytes is None:
                        continue

                    old = prev.get(key)
                    if old:
                        dt = max(0.001, ts - old.get("ts", ts))
                        delta = used_bytes - old.get("used_bytes", used_bytes)

                        # This is what looks like copy/upload speed in Umbrel Files or Windows:
                        # occupied filesystem space growth per second.
                        file_write_raw = max(0, delta) / dt / 1048576
                        file_delete_raw = max(0, -delta) / dt / 1048576

                        window = windows.setdefault(key, [])
                        window.append((ts, file_write_raw, file_delete_raw))
                        cutoff = ts - IO_SMOOTH_WINDOW_SEC
                        while window and window[0][0] < cutoff:
                            window.pop(0)

                        if window:
                            file_write = sum(x[1] for x in window) / len(window)
                            file_delete = sum(x[2] for x in window) / len(window)
                        else:
                            file_write = 0
                            file_delete = 0

                        rates[key] = {
                            "file_write_mbps": round(file_write, 3),
                            "file_write_mbps_raw": round(file_write_raw, 3),
                            "file_delete_mbps": round(file_delete, 3),
                            "fs_interval_sec": round(dt, 3),
                            "fs_smooth_samples": len(window),
                        }

                    prev[key] = {"used_bytes": used_bytes, "ts": ts}

                prev_fs_states[reader] = prev

            return rates


        def attach_io(cards, reader="sampler"):
            block_rates = compute_io_rates(reader)
            fs_rates = compute_fs_growth_rates(cards, reader)

            for card in cards:
                source = card.get("source", "")
                dev = source_to_device_name(source)
                block = block_rates.get(dev) if dev else None
                fs = fs_rates.get(card.get("key"), {})

                file_write = fs.get("file_write_mbps", 0)

                if block:
                    block_read = block.get("read_mbps", 0)
                    block_write = block.get("write_mbps", 0)

                    # User-facing write speed:
                    # When occupied space is growing, this matches Umbrel/Windows copy progress better.
                    # If not growing, fallback to real block-device writeback.
                    if file_write >= 0.05:
                        shown_write = file_write
                        write_mode = "copy/files"
                    else:
                        shown_write = block_write
                        write_mode = "disk/block"

                    card.update({
                        "io_device": dev,
                        "io_available": True,
                        "read_mbps": round(block_read, 3),
                        "write_mbps": round(shown_write, 3),
                        "write_mode": write_mode,
                        "block_read_mbps": round(block_read, 3),
                        "block_write_mbps": round(block_write, 3),
                        "file_write_mbps": round(file_write, 3),
                        "file_write_mbps_raw": fs.get("file_write_mbps_raw", 0),
                        "file_delete_mbps": fs.get("file_delete_mbps", 0),
                        "read_iops": block.get("read_iops", 0),
                        "write_iops": block.get("write_iops", 0),
                        "io_util_percent": block.get("io_util_percent", 0),
                        "raw_read_mbps": block.get("raw_read_mbps", 0),
                        "raw_write_mbps": block.get("raw_write_mbps", 0),
                        "raw_io_util_percent": block.get("raw_io_util_percent", 0),
                        "interval_sec": block.get("interval_sec", 0),
                        "smooth_window_sec": IO_SMOOTH_WINDOW_SEC,
                        "smooth_samples": block.get("smooth_samples", 0),
                        "fs_interval_sec": fs.get("fs_interval_sec", 0),
                        "fs_smooth_samples": fs.get("fs_smooth_samples", 0),
                    })
                else:
                    card.update({
                        "io_device": dev,
                        "io_available": False,
                        "read_mbps": 0,
                        "write_mbps": round(file_write, 3),
                        "write_mode": "copy/files" if file_write >= 0.05 else "none",
                        "block_read_mbps": 0,
                        "block_write_mbps": 0,
                        "file_write_mbps": round(file_write, 3),
                        "file_write_mbps_raw": fs.get("file_write_mbps_raw", 0),
                        "file_delete_mbps": fs.get("file_delete_mbps", 0),
                        "read_iops": 0,
                        "write_iops": 0,
                        "io_util_percent": 0,
                        "interval_sec": 0,
                        "smooth_window_sec": IO_SMOOTH_WINDOW_SEC,
                        "smooth_samples": 0,
                        "fs_interval_sec": fs.get("fs_interval_sec", 0),
                        "fs_smooth_samples": fs.get("fs_smooth_samples", 0),
                    })

            return cards


        def collect_disks(reader="sampler"):
            cards = []
            seen_host_paths = set()
            seen_signatures = set()
            mounts = host_mounts()

            try:
                system_mount = find_mount_for_path(mounts, HOST_UMBREL_ROOT)
                system_source = system_mount.get("source", "")
                system_fs_type = system_mount.get("fs_type", "")

                system_card = {
                    **stat_card("UMBREL_DATA", HOST_UMBREL_ROOT, "system", source=system_source, fs_type=system_fs_type),
                    "path": SYSTEM_PATH,
                }
                add_unique(cards, seen_host_paths, seen_signatures, system_card)
            except Exception as err:
                cards.append({
                    "key": disk_key("system", HOST_UMBREL_ROOT, "system"),
                    "name": "UMBREL_DATA",
                    "kind": "system",
                    "host_path": HOST_UMBREL_ROOT,
                    "mounted": False,
                    "error": str(err),
                })

            for mount in visible_external_mounts(mounts):
                mount_point = mount["mount_point"]
                try:
                    card = stat_card(
                        name_from_path(mount_point),
                        mount_point,
                        "external",
                        source=mount.get("source", ""),
                        fs_type=mount.get("fs_type", ""),
                    )
                    add_unique(cards, seen_host_paths, seen_signatures, card)
                except Exception as err:
                    cards.append({
                        "key": disk_key("external", mount_point, mount.get("source", "")),
                        "name": name_from_path(mount_point),
                        "kind": "external",
                        "host_path": mount_point,
                        "source": mount.get("source", ""),
                        "fs_type": mount.get("fs_type", ""),
                        "mounted": False,
                        "error": str(err),
                    })

            for mount in sorted([m for m in mounts if is_network_mount(m)], key=lambda x: x.get("mount_point", "")):
                mount_point = mount["mount_point"]
                path = container_path(mount_point)

                try:
                    if not os.path.exists(path):
                        continue

                    card = stat_card(
                        name_from_path(mount_point),
                        mount_point,
                        "network",
                        source=mount.get("source", ""),
                        fs_type=mount.get("fs_type", ""),
                    )
                    add_unique(cards, seen_host_paths, seen_signatures, card)
                except Exception as err:
                    cards.append({
                        "key": disk_key("network", mount_point, mount.get("source", "")),
                        "name": name_from_path(mount_point),
                        "kind": "network",
                        "host_path": mount_point,
                        "source": mount.get("source", ""),
                        "fs_type": mount.get("fs_type", ""),
                        "mounted": False,
                        "error": str(err),
                    })

            attach_io(cards, reader)
            return cards, hidden_external_folders(mounts)


        def sample_columns_sql():
            return """
                ts integer not null,
                disk_key text not null,
                name text,
                kind text,
                host_path text,
                source text,
                fs_type text,
                total_gb real,
                used_gb real,
                free_gb real,
                percent real,
                read_mbps real,
                write_mbps real,
                read_iops real,
                write_iops real,
                io_util_percent real
            """


        def ensure_table_columns(conn, table_name):
            existing_cols = {row[1] for row in conn.execute(f"pragma table_info({table_name})").fetchall()}
            wanted = [
                ("read_mbps", "real"),
                ("write_mbps", "real"),
                ("read_iops", "real"),
                ("write_iops", "real"),
                ("io_util_percent", "real"),
            ]
            for col, col_type in wanted:
                if col not in existing_cols:
                    conn.execute(f"alter table {table_name} add column {col} {col_type}")


        def init_db():
            os.makedirs(DATA_DIR, exist_ok=True)
            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                for table_name in ("samples", "samples_10s", "samples_60s"):
                    conn.execute(f"create table if not exists {table_name} ({sample_columns_sql()})")
                    ensure_table_columns(conn, table_name)
                    conn.execute(f"create index if not exists idx_{table_name}_key_ts on {table_name}(disk_key, ts)")

                conn.execute("""
                    create table if not exists disk_state (
                        disk_key text primary key,
                        name text,
                        kind text,
                        host_path text,
                        source text,
                        fs_type text,
                        first_seen integer,
                        last_seen integer,
                        last_changed integer,
                        last_total_gb real,
                        last_used_gb real,
                        last_free_gb real,
                        last_percent real
                    )
                """)

                conn.execute("""
                    create table if not exists app_meta (
                        key text primary key,
                        value text
                    )
                """)
                conn.commit()
                conn.close()


        def insert_sample_row(conn, table_name, ts, card):
            conn.execute(
                f"""
                insert into {table_name}
                (ts,disk_key,name,kind,host_path,source,fs_type,total_gb,used_gb,free_gb,percent,read_mbps,write_mbps,read_iops,write_iops,io_util_percent)
                values (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
                """,
                (
                    ts, card.get("key"), card.get("name"), card.get("kind"), card.get("host_path"),
                    card.get("source"), card.get("fs_type"), card.get("total_gb"),
                    card.get("used_gb"), card.get("free_gb"), card.get("percent"),
                    card.get("read_mbps", 0), card.get("write_mbps", 0),
                    card.get("read_iops", 0), card.get("write_iops", 0),
                    card.get("io_util_percent", 0),
                )
            )


        def save_sample(cards):
            global last_sample_ts
            ts = now_ts()
            if ts - last_sample_ts < SAMPLE_INTERVAL_SEC:
                return

            last_sample_ts = ts

            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                for card in cards:
                    if not card.get("mounted") or card.get("error"):
                        continue

                    key = card["key"]
                    row = conn.execute(
                        "select first_seen,last_changed,last_total_gb,last_used_gb,last_free_gb,last_percent from disk_state where disk_key=?",
                        (key,)
                    ).fetchone()

                    first_seen = ts
                    last_changed = ts

                    if row:
                        first_seen = row[0] or ts
                        last_changed = row[1] or ts
                        prev_total = row[2]
                        prev_used = row[3]
                        prev_free = row[4]
                        prev_percent = row[5]

                        changed = (
                            prev_total is None or
                            abs((prev_used or 0) - card["used_gb"]) >= 0.1 or
                            abs((prev_free or 0) - card["free_gb"]) >= 0.1 or
                            abs((prev_percent or 0) - card["percent"]) >= 0.1
                        )

                        if not changed:
                            last_changed = row[1] or ts

                    insert_sample_row(conn, "samples", ts, card)

                    conn.execute(
                        """
                        insert into disk_state
                        (disk_key,name,kind,host_path,source,fs_type,first_seen,last_seen,last_changed,last_total_gb,last_used_gb,last_free_gb,last_percent)
                        values (?,?,?,?,?,?,?,?,?,?,?,?,?)
                        on conflict(disk_key) do update set
                          name=excluded.name,
                          kind=excluded.kind,
                          host_path=excluded.host_path,
                          source=excluded.source,
                          fs_type=excluded.fs_type,
                          last_seen=excluded.last_seen,
                          last_changed=excluded.last_changed,
                          last_total_gb=excluded.last_total_gb,
                          last_used_gb=excluded.last_used_gb,
                          last_free_gb=excluded.last_free_gb,
                          last_percent=excluded.last_percent
                        """,
                        (
                            key, card.get("name"), card.get("kind"), card.get("host_path"),
                            card.get("source"), card.get("fs_type"), first_seen, ts, last_changed,
                            card.get("total_gb"), card.get("used_gb"), card.get("free_gb"), card.get("percent")
                        )
                    )

                conn.commit()
                conn.close()


        def aggregate_into(conn, src_table, dst_table, bucket_sec, start_ts, end_ts):
            # Insert one averaged point per disk/bucket, and replace duplicates by deleting the bucket range first.
            conn.execute(f"delete from {dst_table} where ts>=? and ts<?", (start_ts, end_ts))
            conn.execute(
                f"""
                insert into {dst_table}
                (ts,disk_key,name,kind,host_path,source,fs_type,total_gb,used_gb,free_gb,percent,read_mbps,write_mbps,read_iops,write_iops,io_util_percent)
                select
                    (ts / ?) * ? as bucket_ts,
                    disk_key,
                    max(name),
                    max(kind),
                    max(host_path),
                    max(source),
                    max(fs_type),
                    round(avg(total_gb), 1),
                    round(avg(used_gb), 1),
                    round(avg(free_gb), 1),
                    round(avg(percent), 1),
                    round(avg(coalesce(read_mbps, 0)), 3),
                    round(avg(coalesce(write_mbps, 0)), 3),
                    round(avg(coalesce(read_iops, 0)), 1),
                    round(avg(coalesce(write_iops, 0)), 1),
                    round(avg(coalesce(io_util_percent, 0)), 1)
                from {src_table}
                where ts>=? and ts<?
                group by disk_key, bucket_ts
                """,
                (bucket_sec, bucket_sec, start_ts, end_ts)
            )


        def compact_history(force=False):
            global last_compact_ts
            ts = now_ts()
            if not force and ts - last_compact_ts < COMPACT_INTERVAL_SEC:
                return

            last_compact_ts = ts

            with db_lock:
                conn = sqlite3.connect(DB_PATH)

                raw_to = ts - RAW_KEEP_SEC
                raw_from = max(0, raw_to - COMPACT_INTERVAL_SEC * 3)
                if raw_to > 0:
                    aggregate_into(conn, "samples", "samples_10s", 10, raw_from, raw_to)

                ten_to = ts - TIER10_KEEP_SEC
                ten_from = max(0, ten_to - COMPACT_INTERVAL_SEC * 3)
                if ten_to > 0:
                    aggregate_into(conn, "samples_10s", "samples_60s", 60, ten_from, ten_to)

                conn.execute("delete from samples where ts < ?", (ts - RAW_KEEP_SEC,))
                conn.execute("delete from samples_10s where ts < ?", (ts - TIER10_KEEP_SEC,))
                conn.execute("delete from samples_60s where ts < ?", (ts - TIER60_KEEP_SEC,))

                conn.commit()
                conn.close()


        def add_state_to_cards(cards):
            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                rows = conn.execute(
                    "select disk_key,first_seen,last_seen,last_changed from disk_state"
                ).fetchall()
                conn.close()

            by_key = {row[0]: {"first_seen": row[1], "last_seen": row[2], "last_changed": row[3]} for row in rows}

            for card in cards:
                state = by_key.get(card.get("key"))
                if state:
                    card.update(state)

            return cards


        def db_stats():
            size_bytes = os.path.getsize(DB_PATH) if os.path.exists(DB_PATH) else 0

            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                counts = {}
                total_rows = 0
                for table_name in ("samples", "samples_10s", "samples_60s"):
                    try:
                        cnt = conn.execute(f"select count(*) from {table_name}").fetchone()[0]
                    except Exception:
                        cnt = 0
                    counts[table_name] = cnt
                    total_rows += cnt

                per_disk_rows = {}
                for table_name in ("samples", "samples_10s", "samples_60s"):
                    try:
                        rows = conn.execute(f"select disk_key,count(*) from {table_name} group by disk_key").fetchall()
                        for key, cnt in rows:
                            per_disk_rows[key] = per_disk_rows.get(key, 0) + cnt
                    except Exception:
                        pass

                conn.close()

            per_disk_mb = {}
            for key, cnt in per_disk_rows.items():
                est = (size_bytes * cnt / total_rows) if total_rows else 0
                per_disk_mb[key] = mib(est)

            return {
                "db_size_bytes": size_bytes,
                "db_size_mb": mib(size_bytes),
                "total_rows": total_rows,
                "counts": counts,
                "per_disk_rows": per_disk_rows,
                "per_disk_est_mb": per_disk_mb,
                "policy": {
                    "raw_1s_hours": 24,
                    "tier_10s_days": 7,
                    "tier_60s_days": 30,
                },
            }


        def make_payload():
            cards, hidden = collect_disks("sampler")
            save_sample(cards)
            compact_history(False)
            add_state_to_cards(cards)

            stats = db_stats()
            for card in cards:
                key = card.get("key")
                card["history_rows"] = stats.get("per_disk_rows", {}).get(key, 0)
                card["history_est_mb"] = stats.get("per_disk_est_mb", {}).get(key, 0)

            return {
                "disks": cards,
                "hidden_unmounted_external_folders": hidden,
                "updated_at": now_ts(),
                "app_version": APP_VERSION,
                "sample_interval_sec": SAMPLE_INTERVAL_SEC,
                "history_stats": stats,
            }


        def sampler_loop():
            global latest_payload
            while True:
                try:
                    payload = make_payload()
                    with cache_lock:
                        latest_payload = payload
                except Exception:
                    pass
                time.sleep(SAMPLE_INTERVAL_SEC)



        def smooth_io_points(points, window_sec=8):
            if not points:
                return points

            result = []
            window = []

            for point in points:
                ts = point.get("ts", 0)
                window.append(point)
                cutoff = ts - window_sec
                while window and window[0].get("ts", 0) < cutoff:
                    window.pop(0)

                smoothed = dict(point)
                if window:
                    for metric, digits in (
                        ("read_mbps", 3),
                        ("write_mbps", 3),
                        ("read_iops", 1),
                        ("write_iops", 1),
                        ("io_util_percent", 1),
                    ):
                        smoothed[metric] = round(
                            sum(float(item.get(metric, 0) or 0) for item in window) / len(window),
                            digits
                        )

                result.append(smoothed)

            return result


        def decimate(points, max_points=2200):
            if len(points) <= max_points:
                return points

            bucket = max(1, len(points) // max_points)
            result = []
            for i in range(0, len(points), bucket):
                chunk = points[i:i + bucket]
                if not chunk:
                    continue
                result.append(chunk[-1])
            return result


        def query_history_rows(conn, table_name, disk, start_ts, end_ts):
            params = [disk, start_ts, end_ts]
            return conn.execute(
                f"""
                select ts, used_gb, free_gb, percent, read_mbps, write_mbps, io_util_percent
                from {table_name}
                where disk_key=? and ts>=? and ts<?
                order by ts asc
                """,
                params
            ).fetchall()


        def history_data(query):
            disk = query.get("disk", [""])[0]
            metric = query.get("metric", ["used_gb"])[0]
            range_sec_raw = query.get("range", ["86400"])[0]

            allowed_metrics = {"used_gb", "free_gb", "percent", "read_mbps", "write_mbps", "io_util_percent"}
            if metric not in allowed_metrics:
                metric = "used_gb"

            try:
                range_sec = int(range_sec_raw)
            except Exception:
                range_sec = 86400

            ts = now_ts()
            start_ts = 0 if range_sec <= 0 else ts - range_sec

            raw_start = max(start_ts, ts - RAW_KEEP_SEC)
            ten_start = max(start_ts, ts - TIER10_KEEP_SEC)
            ten_end = min(ts - RAW_KEEP_SEC, ts)
            sixty_start = max(start_ts, ts - TIER60_KEEP_SEC)
            sixty_end = min(ts - TIER10_KEEP_SEC, ts)

            rows = []
            with db_lock:
                conn = sqlite3.connect(DB_PATH)

                if sixty_start < sixty_end:
                    rows.extend(query_history_rows(conn, "samples_60s", disk, sixty_start, sixty_end))

                if ten_start < ten_end:
                    rows.extend(query_history_rows(conn, "samples_10s", disk, ten_start, ten_end))

                if raw_start < ts + 1:
                    rows.extend(query_history_rows(conn, "samples", disk, raw_start, ts + 1))

                meta = conn.execute(
                    "select name,kind,host_path,source,fs_type from disk_state where disk_key=?",
                    (disk,)
                ).fetchone()
                conn.close()

            rows.sort(key=lambda x: x[0])

            points = []
            seen_ts = set()
            for row in rows:
                if row[0] in seen_ts:
                    continue
                seen_ts.add(row[0])
                points.append({
                    "ts": row[0],
                    "used_gb": row[1] or 0,
                    "free_gb": row[2] or 0,
                    "percent": row[3] or 0,
                    "read_mbps": row[4] or 0,
                    "write_mbps": row[5] or 0,
                    "io_util_percent": row[6] or 0,
                })

            points = smooth_io_points(points, IO_SMOOTH_WINDOW_SEC)
            points = decimate(points)

            return {
                "disk": disk,
                "metric": metric,
                "meta": {
                    "name": meta[0] if meta else disk,
                    "kind": meta[1] if meta else "",
                    "host_path": meta[2] if meta else "",
                    "source": meta[3] if meta else "",
                    "fs_type": meta[4] if meta else "",
                },
                "points": points,
                "sample_interval_sec": SAMPLE_INTERVAL_SEC,
                "policy": {
                    "raw_1s_hours": 24,
                    "tier_10s_days": 7,
                    "tier_60s_days": 30,
                },
            }


        def clear_history():
            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                for table_name in ("samples", "samples_10s", "samples_60s", "disk_state"):
                    conn.execute(f"delete from {table_name}")
                conn.commit()
                conn.execute("vacuum")
                conn.close()

            return {
                "ok": True,
                "history_stats": db_stats(),
            }


        def get_current_data():
            with cache_lock:
                cached = latest_payload

            if cached and now_ts() - cached.get("updated_at", 0) <= 3:
                return cached

            return make_payload()



        def get_live_io_data():
            cards, _ = collect_disks("live")
            disks = []

            for card in cards:
                disks.append({
                    "key": card.get("key", ""),
                    "name": card.get("name", ""),
                    "io_device": card.get("io_device", ""),
                    "io_available": card.get("io_available", False),
                    "read_mbps": card.get("read_mbps", 0),
                    "write_mbps": card.get("write_mbps", 0),
                    "write_mode": card.get("write_mode", "none"),
                    "block_read_mbps": card.get("block_read_mbps", 0),
                    "block_write_mbps": card.get("block_write_mbps", 0),
                    "file_write_mbps": card.get("file_write_mbps", 0),
                    "file_write_mbps_raw": card.get("file_write_mbps_raw", 0),
                    "file_delete_mbps": card.get("file_delete_mbps", 0),
                    "read_iops": card.get("read_iops", 0),
                    "write_iops": card.get("write_iops", 0),
                    "io_util_percent": card.get("io_util_percent", 0),
                    "interval_sec": card.get("interval_sec", 0),
                    "fs_interval_sec": card.get("fs_interval_sec", 0),
                    "smooth_window_sec": IO_SMOOTH_WINDOW_SEC,
                })

            return {
                "disks": disks,
                "updated_at": now_ts(),
                "live_interval_ms": 1000,
                "write_display": "filesystem-growth-preferred",
            }


        def allowed_scan_paths():
            cards, _ = collect_disks("scan")
            allowed = {}
            for card in cards:
                if card.get("mounted") and not card.get("error") and card.get("host_path"):
                    allowed[card["host_path"]] = card
            return allowed


        def get_job(job_id):
            with jobs_lock:
                return top_jobs.get(job_id)


        def put_job(job_id, updates):
            with jobs_lock:
                job = top_jobs.get(job_id)
                if not job:
                    return None
                job.update(updates)
                return dict(job)


        def should_cancel(job_id):
            with jobs_lock:
                job = top_jobs.get(job_id)
                return bool(job and job.get("cancel_requested"))


        def dir_size(path, deadline, job_id, root_label):
            total = 0
            errors = 0
            timed_out = False
            scanned_files = 0

            if deadline and time.time() > deadline:
                return 0, 0, True, 0

            try:
                if os.path.isfile(path):
                    return os.path.getsize(path), 0, False, 1
            except Exception:
                return 0, 1, False, 0

            for root, dirs, files in os.walk(path, topdown=True):
                if should_cancel(job_id):
                    break

                if deadline and time.time() > deadline:
                    timed_out = True
                    break

                if root.startswith("/hostroot/proc") or root.startswith("/hostroot/sys") or root.startswith("/hostroot/dev"):
                    dirs[:] = []
                    continue

                put_job(job_id, {"current_path": root.replace(HOSTROOT, "", 1) or root_label})

                for file_name in files:
                    if should_cancel(job_id):
                        break
                    if deadline and time.time() > deadline:
                        timed_out = True
                        break

                    fp = os.path.join(root, file_name)
                    try:
                        total += os.path.getsize(fp)
                        scanned_files += 1
                    except Exception:
                        errors += 1

                if timed_out or should_cancel(job_id):
                    break

            return total, errors, timed_out, scanned_files


        def top_scan_worker(job_id, host_path, limit, timeout_sec):
            allowed = allowed_scan_paths()
            if host_path not in allowed:
                put_job(job_id, {
                    "status": "error",
                    "error": "Path is not one of current mounted disks",
                    "finished_at": now_ts(),
                })
                return

            base = container_path(host_path)
            deadline = time.time() + timeout_sec if timeout_sec and timeout_sec > 0 else None
            items = []
            total_errors = 0
            timed_out = False
            scanned_entries = 0
            scanned_files = 0

            put_job(job_id, {
                "status": "running",
                "host_path": host_path,
                "name": allowed[host_path].get("name"),
                "started_at": now_ts(),
                "timeout_sec": timeout_sec,
                "current_path": host_path,
            })

            try:
                entries = list(os.scandir(base))
            except Exception as err:
                put_job(job_id, {
                    "status": "error",
                    "error": str(err),
                    "finished_at": now_ts(),
                })
                return

            for entry in entries:
                if should_cancel(job_id):
                    put_job(job_id, {
                        "status": "cancelled",
                        "finished_at": now_ts(),
                    })
                    return

                if deadline and time.time() > deadline:
                    timed_out = True
                    break

                try:
                    scanned_entries += 1
                    item_host_path = host_path.rstrip("/") + "/" + entry.name
                    put_job(job_id, {
                        "current_path": item_host_path,
                        "scanned_entries": scanned_entries,
                        "scanned_files": scanned_files,
                    })

                    if entry.is_dir(follow_symlinks=False):
                        size, errors, item_timeout, file_count = dir_size(entry.path, deadline, job_id, item_host_path)
                        item_type = "dir"
                    else:
                        size = entry.stat(follow_symlinks=False).st_size
                        errors = 0
                        item_timeout = False
                        file_count = 1
                        item_type = "file"

                    scanned_files += file_count
                    total_errors += errors
                    if item_timeout:
                        timed_out = True

                    items.append({
                        "name": entry.name,
                        "type": item_type,
                        "size_gb": gib(size),
                        "size_bytes": size,
                        "host_path": item_host_path,
                    })

                    items.sort(key=lambda x: x["size_bytes"], reverse=True)

                    put_job(job_id, {
                        "items": items[:limit],
                        "errors": total_errors,
                        "timed_out": timed_out,
                        "scanned_entries": scanned_entries,
                        "scanned_files": scanned_files,
                    })

                    if timed_out:
                        break
                except Exception:
                    total_errors += 1

            items.sort(key=lambda x: x["size_bytes"], reverse=True)
            put_job(job_id, {
                "status": "done",
                "items": items[:limit],
                "errors": total_errors,
                "timed_out": timed_out,
                "finished_at": now_ts(),
                "scanned_entries": scanned_entries,
                "scanned_files": scanned_files,
            })


        def start_top_job(query):
            host_path = unquote(query.get("host_path", [""])[0])
            limit_raw = query.get("limit", ["20"])[0]
            timeout_raw = query.get("timeout", [str(DEFAULT_TOP_SCAN_TIMEOUT_SEC)])[0]

            try:
                limit = max(1, min(80, int(limit_raw)))
            except Exception:
                limit = 20

            try:
                timeout_sec = int(timeout_raw)
            except Exception:
                timeout_sec = DEFAULT_TOP_SCAN_TIMEOUT_SEC

            if timeout_sec < 0:
                timeout_sec = DEFAULT_TOP_SCAN_TIMEOUT_SEC

            job_id = uuid.uuid4().hex

            with jobs_lock:
                cutoff = now_ts() - 3600
                for old_id in list(top_jobs.keys()):
                    if top_jobs[old_id].get("created_at", 0) < cutoff:
                        top_jobs.pop(old_id, None)

                top_jobs[job_id] = {
                    "job_id": job_id,
                    "status": "queued",
                    "created_at": now_ts(),
                    "host_path": host_path,
                    "items": [],
                    "errors": 0,
                    "timed_out": False,
                    "scanned_entries": 0,
                    "scanned_files": 0,
                    "timeout_sec": timeout_sec,
                    "cancel_requested": False,
                    "current_path": host_path,
                }

            threading.Thread(target=top_scan_worker, args=(job_id, host_path, limit, timeout_sec), daemon=True).start()

            return {"job_id": job_id, "status": "queued"}


        def top_status(query):
            job_id = query.get("job_id", [""])[0]
            job = get_job(job_id)
            if not job:
                return {"error": "Unknown job_id"}
            return job


        def cancel_top_job(query):
            job_id = query.get("job_id", [""])[0]
            job = put_job(job_id, {"cancel_requested": True})
            if not job:
                return {"error": "Unknown job_id"}
            return {"job_id": job_id, "cancel_requested": True}


