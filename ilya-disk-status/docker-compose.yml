services:
  app_proxy:
    environment:
      APP_HOST: ilya-disk-status_server_1
      APP_PORT: 8080

  server:
    image: python:3.12-alpine
    restart: on-failure
    pid: host
    volumes:
      - /:/hostroot:ro,rslave
      - ${UMBREL_ROOT}:/umbrel-root:ro
      - ${UMBREL_ROOT}/app-data/ilya-disk-status/data:/data
    command:
      - sh
      - -c
      - |
        cat > /tmp/server.py <<'PY'
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
        from urllib.parse import urlparse, parse_qs, unquote
        import json
        import os
        import re
        import sqlite3
        import threading
        import time
        import uuid

        APP_VERSION = "1.5.1"
        HOSTROOT = "/hostroot"
        SYSTEM_PATH = "/umbrel-root"
        HOST_UMBREL_ROOT = "${UMBREL_ROOT}".rstrip("/")
        HOST_EXTERNAL_ROOT = HOST_UMBREL_ROOT + "/external"

        DATA_DIR = "/data"
        DB_PATH = DATA_DIR + "/history.sqlite"
        SAMPLE_INTERVAL_SEC = 1
        RETENTION_DAYS = 14
        DEFAULT_TOP_SCAN_TIMEOUT_SEC = 25

        NETWORK_FS_TYPES = {
            "cifs", "smb3", "nfs", "nfs4", "fuse.sshfs", "sshfs",
            "fuse.rclone", "rclone", "davfs", "fuse.davfs", "fuse.webdav",
            "9p", "virtiofs"
        }

        SKIP_PREFIXES = (
            "/proc", "/sys", "/dev", "/run", "/tmp", "/boot",
            "/var/lib/docker", "/var/lib/containerd",
            "/data/docker", "/data/data/docker", "/data/data/volumes"
        )

        db_lock = threading.Lock()
        jobs_lock = threading.Lock()
        cache_lock = threading.Lock()
        io_lock = threading.Lock()

        top_jobs = {}
        last_sample_ts = 0
        latest_payload = None
        prev_diskstats = {}
        prev_diskstats_ts = None


        def now_ts():
            return int(time.time())


        def decode_path(value):
            return (
                value
                .replace("\\040", " ")
                .replace("\\011", "\t")
                .replace("\\012", "\n")
                .replace("\\134", "\\")
            )


        def is_under(path, parent):
            parent = parent.rstrip("/")
            return path == parent or path.startswith(parent + "/")


        def container_path(host_path):
            return HOSTROOT if host_path == "/" else HOSTROOT + host_path


        def gib(value):
            return round(value / 1073741824, 1)


        def disk_key(kind, host_path, source=""):
            raw = kind + "|" + host_path + "|" + source
            return re.sub(r"[^a-zA-Z0-9_.-]+", "_", raw).strip("_")[:180]


        def parse_mountinfo(path):
            out = []
            try:
                with open(path, "r", encoding="utf-8") as f:
                    for line in f:
                        parts = line.strip().split()
                        if len(parts) < 10 or "-" not in parts:
                            continue
                        sep = parts.index("-")
                        mount_point = decode_path(parts[4])
                        fs_type = parts[sep + 1] if len(parts) > sep + 1 else ""
                        source = decode_path(parts[sep + 2]) if len(parts) > sep + 2 else ""
                        out.append({
                            "mount_point": mount_point,
                            "fs_type": fs_type,
                            "source": source,
                        })
            except Exception:
                pass
            return out


        def host_mounts():
            mounts = parse_mountinfo("/proc/1/mountinfo")
            if not mounts:
                mounts = parse_mountinfo("/proc/self/mountinfo")
            return mounts


        def find_mount_for_path(mounts, host_path):
            best = None
            for mount in mounts:
                mp = mount.get("mount_point", "")
                if not mp:
                    continue
                if is_under(host_path, mp):
                    if best is None or len(mp) > len(best.get("mount_point", "")):
                        best = mount
            return best or {}


        def is_network_mount(mount):
            fs_type = mount.get("fs_type", "")
            source = mount.get("source", "")
            mount_point = mount.get("mount_point", "")

            if not mount_point or mount_point == "/":
                return False

            for prefix in SKIP_PREFIXES:
                if is_under(mount_point, prefix):
                    return False

            if fs_type in NETWORK_FS_TYPES:
                return True

            if fs_type.startswith("fuse.") and any(x in fs_type for x in ("rclone", "sshfs", "dav", "webdav")):
                return True

            if source.startswith("//"):
                return True

            if ":" in source and fs_type in ("nfs", "nfs4", "fuse.sshfs", "sshfs"):
                return True

            return False


        def name_from_path(path):
            base = os.path.basename(path.rstrip("/")) or path
            return re.sub(r"\s+\(\d+\)$", "", base)


        def stat_card(name, host_path, kind, source="", fs_type=""):
            path = container_path(host_path)
            st_path = os.stat(path)
            st = os.statvfs(path)

            total = st.f_blocks * st.f_frsize
            free = st.f_bavail * st.f_frsize
            used = total - free
            percent = round((used / total) * 100, 1) if total else 0

            key = disk_key(kind, host_path, source or fs_type or name)

            return {
                "key": key,
                "name": name,
                "kind": kind,
                "host_path": host_path,
                "path": path,
                "source": source,
                "fs_type": fs_type,
                "mounted": True,
                "device_id": st_path.st_dev,
                "total_gb": gib(total),
                "used_gb": gib(used),
                "free_gb": gib(free),
                "percent": percent,
            }


        def add_unique(cards, seen_host_paths, seen_signatures, card):
            host_path = card.get("host_path", "")
            signature = (
                card.get("kind", ""),
                card.get("source", ""),
                card.get("fs_type", ""),
                card.get("device_id", ""),
            )

            if host_path and host_path in seen_host_paths:
                return

            if card.get("kind") in ("external", "network") and signature in seen_signatures:
                return

            cards.append(card)

            if host_path:
                seen_host_paths.add(host_path)

            if card.get("kind") in ("external", "network"):
                seen_signatures.add(signature)


        def external_mounts(mounts):
            result = []
            for mount in mounts:
                mount_point = mount.get("mount_point", "")
                if not mount_point:
                    continue
                if mount_point == HOST_EXTERNAL_ROOT:
                    continue
                if is_under(mount_point, HOST_EXTERNAL_ROOT):
                    result.append(mount)

            result.sort(key=lambda x: x.get("mount_point", ""))
            return result


        def visible_external_mounts(mounts):
            result = []
            for mount in external_mounts(mounts):
                if is_network_mount(mount):
                    continue
                mount_point = mount["mount_point"]
                path = container_path(mount_point)
                if not os.path.ismount(path):
                    continue
                result.append(mount)
            return result


        def hidden_external_folders(mounts):
            hidden = []
            mounted_paths = set(m["mount_point"] for m in external_mounts(mounts))
            ext_container = container_path(HOST_EXTERNAL_ROOT)

            try:
                if os.path.isdir(ext_container):
                    for name in sorted(os.listdir(ext_container)):
                        host_path = HOST_EXTERNAL_ROOT + "/" + name
                        path = os.path.join(ext_container, name)

                        if os.path.isdir(path) and host_path not in mounted_paths:
                            hidden.append({
                                "name": name,
                                "host_path": host_path,
                            })
            except Exception:
                pass

            return hidden


        def read_diskstats():
            stats = {}
            try:
                with open("/proc/diskstats", "r", encoding="utf-8") as f:
                    for line in f:
                        parts = line.split()
                        if len(parts) < 14:
                            continue

                        name = parts[2]

                        try:
                            reads = int(parts[3])
                            sectors_read = int(parts[5])
                            writes = int(parts[7])
                            sectors_written = int(parts[9])
                            io_ms = int(parts[12])
                        except Exception:
                            continue

                        stats[name] = {
                            "reads": reads,
                            "writes": writes,
                            "read_bytes": sectors_read * 512,
                            "write_bytes": sectors_written * 512,
                            "io_ms": io_ms,
                        }
            except Exception:
                pass
            return stats


        def source_to_device_name(source):
            if not source or not source.startswith("/dev/"):
                return ""

            if source.startswith("/dev/mapper/"):
                try:
                    real = os.path.realpath(HOSTROOT + source)
                    base = os.path.basename(real)
                    if base:
                        return base
                except Exception:
                    pass

            return os.path.basename(source)


        def compute_io_rates():
            global prev_diskstats, prev_diskstats_ts

            current = read_diskstats()
            ts = time.time()
            rates = {}

            with io_lock:
                if prev_diskstats and prev_diskstats_ts:
                    dt = max(0.001, ts - prev_diskstats_ts)

                    for dev, cur in current.items():
                        prev = prev_diskstats.get(dev)
                        if not prev:
                            continue

                        read_delta = max(0, cur["read_bytes"] - prev.get("read_bytes", 0))
                        write_delta = max(0, cur["write_bytes"] - prev.get("write_bytes", 0))
                        reads_delta = max(0, cur["reads"] - prev.get("reads", 0))
                        writes_delta = max(0, cur["writes"] - prev.get("writes", 0))
                        io_ms_delta = max(0, cur["io_ms"] - prev.get("io_ms", 0))

                        rates[dev] = {
                            "io_device": dev,
                            "io_available": True,
                            "read_mbps": round(read_delta / dt / 1048576, 3),
                            "write_mbps": round(write_delta / dt / 1048576, 3),
                            "read_iops": round(reads_delta / dt, 1),
                            "write_iops": round(writes_delta / dt, 1),
                            "io_util_percent": round(min(100, io_ms_delta / (dt * 10)), 1),
                        }

                prev_diskstats = current
                prev_diskstats_ts = ts

            return rates


        def attach_io(cards):
            rates = compute_io_rates()

            for card in cards:
                source = card.get("source", "")
                dev = source_to_device_name(source)

                if dev and dev in rates:
                    card.update(rates[dev])
                else:
                    card.update({
                        "io_device": dev,
                        "io_available": False,
                        "read_mbps": 0,
                        "write_mbps": 0,
                        "read_iops": 0,
                        "write_iops": 0,
                        "io_util_percent": 0,
                    })

            return cards


        def collect_disks():
            cards = []
            seen_host_paths = set()
            seen_signatures = set()
            mounts = host_mounts()

            try:
                system_mount = find_mount_for_path(mounts, HOST_UMBREL_ROOT)
                system_source = system_mount.get("source", "")
                system_fs_type = system_mount.get("fs_type", "")

                system_card = {
                    **stat_card("UMBREL_DATA", HOST_UMBREL_ROOT, "system", source=system_source, fs_type=system_fs_type),
                    "path": SYSTEM_PATH,
                }
                add_unique(cards, seen_host_paths, seen_signatures, system_card)
            except Exception as err:
                cards.append({
                    "key": disk_key("system", HOST_UMBREL_ROOT, "system"),
                    "name": "UMBREL_DATA",
                    "kind": "system",
                    "host_path": HOST_UMBREL_ROOT,
                    "mounted": False,
                    "error": str(err),
                })

            for mount in visible_external_mounts(mounts):
                mount_point = mount["mount_point"]
                try:
                    card = stat_card(
                        name_from_path(mount_point),
                        mount_point,
                        "external",
                        source=mount.get("source", ""),
                        fs_type=mount.get("fs_type", ""),
                    )
                    add_unique(cards, seen_host_paths, seen_signatures, card)
                except Exception as err:
                    cards.append({
                        "key": disk_key("external", mount_point, mount.get("source", "")),
                        "name": name_from_path(mount_point),
                        "kind": "external",
                        "host_path": mount_point,
                        "source": mount.get("source", ""),
                        "fs_type": mount.get("fs_type", ""),
                        "mounted": False,
                        "error": str(err),
                    })

            for mount in sorted([m for m in mounts if is_network_mount(m)], key=lambda x: x.get("mount_point", "")):
                mount_point = mount["mount_point"]
                path = container_path(mount_point)

                try:
                    if not os.path.exists(path):
                        continue

                    card = stat_card(
                        name_from_path(mount_point),
                        mount_point,
                        "network",
                        source=mount.get("source", ""),
                        fs_type=mount.get("fs_type", ""),
                    )
                    add_unique(cards, seen_host_paths, seen_signatures, card)
                except Exception as err:
                    cards.append({
                        "key": disk_key("network", mount_point, mount.get("source", "")),
                        "name": name_from_path(mount_point),
                        "kind": "network",
                        "host_path": mount_point,
                        "source": mount.get("source", ""),
                        "fs_type": mount.get("fs_type", ""),
                        "mounted": False,
                        "error": str(err),
                    })

            attach_io(cards)
            return cards, hidden_external_folders(mounts)


        def init_db():
            os.makedirs(DATA_DIR, exist_ok=True)
            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                conn.execute("""
                    create table if not exists samples (
                        ts integer not null,
                        disk_key text not null,
                        name text,
                        kind text,
                        host_path text,
                        source text,
                        fs_type text,
                        total_gb real,
                        used_gb real,
                        free_gb real,
                        percent real
                    )
                """)

                existing_cols = {row[1] for row in conn.execute("pragma table_info(samples)").fetchall()}
                for col, col_type in [
                    ("read_mbps", "real"),
                    ("write_mbps", "real"),
                    ("read_iops", "real"),
                    ("write_iops", "real"),
                    ("io_util_percent", "real"),
                ]:
                    if col not in existing_cols:
                        conn.execute(f"alter table samples add column {col} {col_type}")

                conn.execute("create index if not exists idx_samples_key_ts on samples(disk_key, ts)")
                conn.execute("""
                    create table if not exists disk_state (
                        disk_key text primary key,
                        name text,
                        kind text,
                        host_path text,
                        source text,
                        fs_type text,
                        first_seen integer,
                        last_seen integer,
                        last_changed integer,
                        last_total_gb real,
                        last_used_gb real,
                        last_free_gb real,
                        last_percent real
                    )
                """)
                conn.commit()
                conn.close()


        def save_sample(cards):
            global last_sample_ts
            ts = now_ts()
            if ts - last_sample_ts < SAMPLE_INTERVAL_SEC:
                return

            last_sample_ts = ts

            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                for card in cards:
                    if not card.get("mounted") or card.get("error"):
                        continue

                    key = card["key"]
                    row = conn.execute(
                        "select first_seen,last_changed,last_total_gb,last_used_gb,last_free_gb,last_percent from disk_state where disk_key=?",
                        (key,)
                    ).fetchone()

                    first_seen = ts
                    last_changed = ts

                    if row:
                        first_seen = row[0] or ts
                        last_changed = row[1] or ts
                        prev_total = row[2]
                        prev_used = row[3]
                        prev_free = row[4]
                        prev_percent = row[5]

                        changed = (
                            prev_total is None or
                            abs((prev_used or 0) - card["used_gb"]) >= 0.1 or
                            abs((prev_free or 0) - card["free_gb"]) >= 0.1 or
                            abs((prev_percent or 0) - card["percent"]) >= 0.1
                        )

                        if not changed:
                            last_changed = row[1] or ts

                    conn.execute(
                        """
                        insert into samples
                        (ts,disk_key,name,kind,host_path,source,fs_type,total_gb,used_gb,free_gb,percent,read_mbps,write_mbps,read_iops,write_iops,io_util_percent)
                        values (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
                        """,
                        (
                            ts, key, card.get("name"), card.get("kind"), card.get("host_path"),
                            card.get("source"), card.get("fs_type"), card.get("total_gb"),
                            card.get("used_gb"), card.get("free_gb"), card.get("percent"),
                            card.get("read_mbps", 0), card.get("write_mbps", 0),
                            card.get("read_iops", 0), card.get("write_iops", 0),
                            card.get("io_util_percent", 0),
                        )
                    )

                    conn.execute(
                        """
                        insert into disk_state
                        (disk_key,name,kind,host_path,source,fs_type,first_seen,last_seen,last_changed,last_total_gb,last_used_gb,last_free_gb,last_percent)
                        values (?,?,?,?,?,?,?,?,?,?,?,?,?)
                        on conflict(disk_key) do update set
                          name=excluded.name,
                          kind=excluded.kind,
                          host_path=excluded.host_path,
                          source=excluded.source,
                          fs_type=excluded.fs_type,
                          last_seen=excluded.last_seen,
                          last_changed=excluded.last_changed,
                          last_total_gb=excluded.last_total_gb,
                          last_used_gb=excluded.last_used_gb,
                          last_free_gb=excluded.last_free_gb,
                          last_percent=excluded.last_percent
                        """,
                        (
                            key, card.get("name"), card.get("kind"), card.get("host_path"),
                            card.get("source"), card.get("fs_type"), first_seen, ts, last_changed,
                            card.get("total_gb"), card.get("used_gb"), card.get("free_gb"), card.get("percent")
                        )
                    )

                cutoff = ts - RETENTION_DAYS * 86400
                conn.execute("delete from samples where ts < ?", (cutoff,))
                conn.commit()
                conn.close()


        def add_state_to_cards(cards):
            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                rows = conn.execute(
                    "select disk_key,first_seen,last_seen,last_changed from disk_state"
                ).fetchall()
                conn.close()

            by_key = {row[0]: {"first_seen": row[1], "last_seen": row[2], "last_changed": row[3]} for row in rows}

            for card in cards:
                state = by_key.get(card.get("key"))
                if state:
                    card.update(state)

            return cards


        def make_payload():
            cards, hidden = collect_disks()
            save_sample(cards)
            add_state_to_cards(cards)

            return {
                "disks": cards,
                "hidden_unmounted_external_folders": hidden,
                "updated_at": now_ts(),
                "app_version": APP_VERSION,
                "sample_interval_sec": SAMPLE_INTERVAL_SEC,
                "retention_days": RETENTION_DAYS,
            }


        def sampler_loop():
            global latest_payload
            while True:
                try:
                    payload = make_payload()
                    with cache_lock:
                        latest_payload = payload
                except Exception:
                    pass
                time.sleep(SAMPLE_INTERVAL_SEC)


        def decimate(points, max_points=2200):
            if len(points) <= max_points:
                return points

            bucket = max(1, len(points) // max_points)
            result = []
            for i in range(0, len(points), bucket):
                chunk = points[i:i + bucket]
                if not chunk:
                    continue
                result.append(chunk[-1])
            return result


        def history_data(query):
            disk = query.get("disk", [""])[0]
            metric = query.get("metric", ["used_gb"])[0]
            range_sec_raw = query.get("range", ["86400"])[0]

            allowed_metrics = {"used_gb", "free_gb", "percent", "read_mbps", "write_mbps", "io_util_percent"}
            if metric not in allowed_metrics:
                metric = "used_gb"

            try:
                range_sec = int(range_sec_raw)
            except Exception:
                range_sec = 86400

            where = "disk_key=?"
            params = [disk]

            if range_sec > 0:
                cutoff = now_ts() - range_sec
                where += " and ts>=?"
                params.append(cutoff)

            with db_lock:
                conn = sqlite3.connect(DB_PATH)
                rows = conn.execute(
                    """
                    select ts, used_gb, free_gb, percent, read_mbps, write_mbps, io_util_percent
                    from samples
                    where """ + where + " order by ts asc",
                    params
                ).fetchall()
                meta = conn.execute(
                    "select name,kind,host_path,source,fs_type from disk_state where disk_key=?",
                    (disk,)
                ).fetchone()
                conn.close()

            points = []
            for row in rows:
                points.append({
                    "ts": row[0],
                    "used_gb": row[1] or 0,
                    "free_gb": row[2] or 0,
                    "percent": row[3] or 0,
                    "read_mbps": row[4] or 0,
                    "write_mbps": row[5] or 0,
                    "io_util_percent": row[6] or 0,
                })

            points = decimate(points)

            return {
                "disk": disk,
                "metric": metric,
                "meta": {
                    "name": meta[0] if meta else disk,
                    "kind": meta[1] if meta else "",
                    "host_path": meta[2] if meta else "",
                    "source": meta[3] if meta else "",
                    "fs_type": meta[4] if meta else "",
                },
                "points": points,
                "sample_interval_sec": SAMPLE_INTERVAL_SEC,
            }


        def get_current_data():
            with cache_lock:
                cached = latest_payload

            if cached and now_ts() - cached.get("updated_at", 0) <= 3:
                return cached

            return make_payload()


        def allowed_scan_paths():
            cards, _ = collect_disks()
            allowed = {}
            for card in cards:
                if card.get("mounted") and not card.get("error") and card.get("host_path"):
                    allowed[card["host_path"]] = card
            return allowed


        def get_job(job_id):
            with jobs_lock:
                return top_jobs.get(job_id)


        def put_job(job_id, updates):
            with jobs_lock:
                job = top_jobs.get(job_id)
                if not job:
                    return None
                job.update(updates)
                return dict(job)


        def should_cancel(job_id):
            with jobs_lock:
                job = top_jobs.get(job_id)
                return bool(job and job.get("cancel_requested"))


        def dir_size(path, deadline, job_id, root_label):
            total = 0
            errors = 0
            timed_out = False
            scanned_files = 0

            if deadline and time.time() > deadline:
                return 0, 0, True, 0

            try:
                if os.path.isfile(path):
                    return os.path.getsize(path), 0, False, 1
            except Exception:
                return 0, 1, False, 0

            for root, dirs, files in os.walk(path, topdown=True):
                if should_cancel(job_id):
                    break

                if deadline and time.time() > deadline:
                    timed_out = True
                    break

                if root.startswith("/hostroot/proc") or root.startswith("/hostroot/sys") or root.startswith("/hostroot/dev"):
                    dirs[:] = []
                    continue

                put_job(job_id, {"current_path": root.replace(HOSTROOT, "", 1) or root_label})

                for file_name in files:
                    if should_cancel(job_id):
                        break
                    if deadline and time.time() > deadline:
                        timed_out = True
                        break

                    fp = os.path.join(root, file_name)
                    try:
                        total += os.path.getsize(fp)
                        scanned_files += 1
                    except Exception:
                        errors += 1

                if timed_out or should_cancel(job_id):
                    break

            return total, errors, timed_out, scanned_files


        def top_scan_worker(job_id, host_path, limit, timeout_sec):
            allowed = allowed_scan_paths()
            if host_path not in allowed:
                put_job(job_id, {
                    "status": "error",
                    "error": "Path is not one of current mounted disks",
                    "finished_at": now_ts(),
                })
                return

            base = container_path(host_path)
            deadline = time.time() + timeout_sec if timeout_sec and timeout_sec > 0 else None
            items = []
            total_errors = 0
            timed_out = False
            scanned_entries = 0
            scanned_files = 0

            put_job(job_id, {
                "status": "running",
                "host_path": host_path,
                "name": allowed[host_path].get("name"),
                "started_at": now_ts(),
                "timeout_sec": timeout_sec,
                "current_path": host_path,
            })

            try:
                entries = list(os.scandir(base))
            except Exception as err:
                put_job(job_id, {
                    "status": "error",
                    "error": str(err),
                    "finished_at": now_ts(),
                })
                return

            for entry in entries:
                if should_cancel(job_id):
                    put_job(job_id, {
                        "status": "cancelled",
                        "finished_at": now_ts(),
                    })
                    return

                if deadline and time.time() > deadline:
                    timed_out = True
                    break

                try:
                    scanned_entries += 1
                    item_host_path = host_path.rstrip("/") + "/" + entry.name
                    put_job(job_id, {
                        "current_path": item_host_path,
                        "scanned_entries": scanned_entries,
                        "scanned_files": scanned_files,
                    })

                    if entry.is_dir(follow_symlinks=False):
                        size, errors, item_timeout, file_count = dir_size(entry.path, deadline, job_id, item_host_path)
                        item_type = "dir"
                    else:
                        size = entry.stat(follow_symlinks=False).st_size
                        errors = 0
                        item_timeout = False
                        file_count = 1
                        item_type = "file"

                    scanned_files += file_count
                    total_errors += errors
                    if item_timeout:
                        timed_out = True

                    items.append({
                        "name": entry.name,
                        "type": item_type,
                        "size_gb": gib(size),
                        "size_bytes": size,
                        "host_path": item_host_path,
                    })

                    items.sort(key=lambda x: x["size_bytes"], reverse=True)

                    put_job(job_id, {
                        "items": items[:limit],
                        "errors": total_errors,
                        "timed_out": timed_out,
                        "scanned_entries": scanned_entries,
                        "scanned_files": scanned_files,
                    })

                    if timed_out:
                        break
                except Exception:
                    total_errors += 1

            items.sort(key=lambda x: x["size_bytes"], reverse=True)
            put_job(job_id, {
                "status": "done",
                "items": items[:limit],
                "errors": total_errors,
                "timed_out": timed_out,
                "finished_at": now_ts(),
                "scanned_entries": scanned_entries,
                "scanned_files": scanned_files,
            })


        def start_top_job(query):
            host_path = unquote(query.get("host_path", [""])[0])
            limit_raw = query.get("limit", ["20"])[0]
            timeout_raw = query.get("timeout", [str(DEFAULT_TOP_SCAN_TIMEOUT_SEC)])[0]

            try:
                limit = max(1, min(80, int(limit_raw)))
            except Exception:
                limit = 20

            try:
                timeout_sec = int(timeout_raw)
            except Exception:
                timeout_sec = DEFAULT_TOP_SCAN_TIMEOUT_SEC

            if timeout_sec < 0:
                timeout_sec = DEFAULT_TOP_SCAN_TIMEOUT_SEC

            job_id = uuid.uuid4().hex

            with jobs_lock:
                cutoff = now_ts() - 3600
                for old_id in list(top_jobs.keys()):
                    if top_jobs[old_id].get("created_at", 0) < cutoff:
                        top_jobs.pop(old_id, None)

                top_jobs[job_id] = {
                    "job_id": job_id,
                    "status": "queued",
                    "created_at": now_ts(),
                    "host_path": host_path,
                    "items": [],
                    "errors": 0,
                    "timed_out": False,
                    "scanned_entries": 0,
                    "scanned_files": 0,
                    "timeout_sec": timeout_sec,
                    "cancel_requested": False,
                    "current_path": host_path,
                }

            threading.Thread(target=top_scan_worker, args=(job_id, host_path, limit, timeout_sec), daemon=True).start()

            return {"job_id": job_id, "status": "queued"}


        def top_status(query):
            job_id = query.get("job_id", [""])[0]
            job = get_job(job_id)
            if not job:
                return {"error": "Unknown job_id"}
            return job


        def cancel_top_job(query):
            job_id = query.get("job_id", [""])[0]
            job = put_job(job_id, {"cancel_requested": True})
            if not job:
                return {"error": "Unknown job_id"}
            return {"job_id": job_id, "cancel_requested": True}


        HTML = "<!doctype html>\n<html lang=\"ru\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Disk Status</title>\n<style>\n*{box-sizing:border-box}\nbody{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;background:radial-gradient(circle at top,#1e293b,#020617 70%);color:#e5e7eb}\nbutton,select{font:inherit}\n.wrap{max-width:1220px;margin:34px auto;padding:0 20px 48px}\nh1{font-size:36px;margin:0 0 8px;letter-spacing:-.03em}\n.sub{color:#94a3b8;margin-bottom:18px}\n.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}\n.pill{border:1px solid #334155;background:#0f172a;color:#cbd5e1;border-radius:999px;padding:9px 13px;cursor:pointer}\n.pill.active{background:#2563eb;color:white;border-color:#60a5fa}\n.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(345px,1fr));gap:18px}\n.card{background:rgba(15,23,42,.92);border:1px solid #243244;border-radius:22px;padding:22px;box-shadow:0 16px 40px rgba(0,0,0,.35)}\n.top{display:flex;justify-content:space-between;gap:16px;align-items:baseline;margin-bottom:14px}\n.name{font-size:22px;font-weight:800;word-break:break-word}\n.badge{display:inline-block;margin-top:6px;color:#93c5fd;font-size:12px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}\n.source{color:#64748b;font-size:12px;margin-top:10px;overflow-wrap:anywhere;line-height:1.35}\n.percent{font-size:34px;font-weight:900;white-space:nowrap}\n.bar{height:20px;border-radius:999px;background:linear-gradient(90deg,#22c55e 0%,#84cc16 45%,#eab308 70%,#f97316 88%,#ef4444 100%);overflow:hidden;margin:16px 0;border:1px solid #334155;position:relative}\n.mask{position:absolute;top:0;bottom:0;right:0;background:#1f2937;border-left:1px solid rgba(15,23,42,.25)}\n.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}\n.stat{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px}\n.label{color:#94a3b8;font-size:13px;margin-bottom:5px}\n.value{font-size:18px;font-weight:800}\n.ioBox{margin-top:12px;background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}\n.ioVal{font-weight:800;color:#bfdbfe;margin-top:3px}\n.ioOff{color:#64748b}\n.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}\n.btn{border:1px solid #334155;background:#020617;color:#dbeafe;border-radius:10px;padding:8px 10px;cursor:pointer}\n.btn:hover{background:#111827}\n.btn.danger{color:#fecaca;border-color:#7f1d1d}\n.mini{font-size:12px;color:#64748b;margin-top:10px;line-height:1.4}\n.error{color:#f87171;font-weight:800;word-break:break-word}\n.footer{margin-top:18px;color:#64748b;font-size:13px;line-height:1.45}\ndetails.hidden{margin-top:8px;color:#94a3b8}\ndetails.hidden summary{cursor:pointer;color:#cbd5e1}\n.overlay{position:fixed;inset:0;background:rgba(2,6,23,.82);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}\n.modal{width:min(1180px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid #334155;border-radius:22px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.55)}\n.modalHead{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}\n.modalTitle{font-size:22px;font-weight:900}\n.close{border:1px solid #475569;background:#020617;color:white;border-radius:10px;padding:8px 12px;cursor:pointer}\n.chartControls,.scanControls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}\n.chartBox{height:540px;background:#020617;border:1px solid #1e293b;border-radius:16px;padding:10px;position:relative}\ncanvas{width:100%;height:100%;display:block}\n.table{width:100%;border-collapse:collapse;margin-top:12px}\n.table th,.table td{border-bottom:1px solid #1e293b;padding:10px;text-align:left}\n.table th{color:#93c5fd}\n.spinnerWrap{display:flex;align-items:center;gap:12px;margin:14px 0;color:#cbd5e1}\n.spinner{width:28px;height:28px;border-radius:50%;border:3px solid #1e293b;border-top-color:#60a5fa;animation:spin .8s linear infinite}\n@keyframes spin{to{transform:rotate(360deg)}}\n.progress{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;margin-top:10px}\n.pathNow{color:#94a3b8;overflow-wrap:anywhere;font-size:12px;margin-top:6px}\n.warnText{color:#fbbf24}\n.legend{display:flex;gap:12px;align-items:center;color:#94a3b8;font-size:12px;margin:2px 0 10px}\n.dot{width:10px;height:10px;border-radius:50%;display:inline-block}\n@media(max-width:800px){.grid{grid-template-columns:1fr}.stats,.ioBox{grid-template-columns:1fr}.top{flex-direction:column}.chartBox{height:420px}}\n</style>\n</head>\n<body>\n<div class=\"wrap\">\n  <h1>Disk Status</h1>\n  <div class=\"sub\">Системный раздел, реальные внешние диски и сетевые mount-диски. История и I/O пишутся каждую секунду. Карточки обновляются каждые 5 секунд.</div>\n  <div class=\"toolbar\" id=\"filters\"></div>\n  <div id=\"app\">Загрузка...</div>\n  <div class=\"footer\" id=\"updated\"></div>\n</div>\n\n<div class=\"overlay\" id=\"historyOverlay\">\n  <div class=\"modal\">\n    <div class=\"modalHead\">\n      <div>\n        <div class=\"modalTitle\" id=\"historyTitle\">История</div>\n        <div class=\"mini\" id=\"historyHint\">Колесо мыши — приблизить/отдалить. Зажать мышь и тянуть — двигать диапазон. Наведи мышкой на линию — увидишь точные значения.</div>\n      </div>\n      <button class=\"close\" onclick=\"closeHistory()\">Закрыть</button>\n    </div>\n    <div class=\"chartControls\">\n      <select id=\"metricSelect\" class=\"pill\" onchange=\"loadHistory()\">\n        <option value=\"used_gb\">Занято GB</option>\n        <option value=\"free_gb\">Свободно GB</option>\n        <option value=\"percent\">Процент %</option>\n        <option value=\"read_mbps\">Чтение MB/s</option>\n        <option value=\"write_mbps\">Запись MB/s</option>\n        <option value=\"io_util_percent\">I/O util %</option>\n      </select>\n      <button class=\"pill\" onclick=\"setRange(300)\">5м</button>\n      <button class=\"pill\" onclick=\"setRange(3600)\">1ч</button>\n      <button class=\"pill\" onclick=\"setRange(21600)\">6ч</button>\n      <button class=\"pill\" onclick=\"setRange(86400)\">24ч</button>\n      <button class=\"pill\" onclick=\"setRange(604800)\">7д</button>\n      <button class=\"pill\" onclick=\"setRange(0)\">Всё</button>\n      <button class=\"pill\" onclick=\"resetChartView()\">Сбросить</button>\n    </div>\n    <div class=\"legend\" id=\"ioLegend\" style=\"display:none\">\n      <span><span class=\"dot\" style=\"background:#60a5fa\"></span> чтение MB/s</span>\n      <span><span class=\"dot\" style=\"background:#f59e0b\"></span> запись MB/s</span>\n    </div>\n    <div class=\"chartBox\"><canvas id=\"historyCanvas\"></canvas></div>\n  </div>\n</div>\n\n<div class=\"overlay\" id=\"topOverlay\">\n  <div class=\"modal\">\n    <div class=\"modalHead\">\n      <div>\n        <div class=\"modalTitle\" id=\"topTitle\">Топ папок</div>\n        <div class=\"mini\">Сканирование read-only: данные не меняет, но может грузить диск/сеть. Для больших сетевых дисков лучше начать с 25–60 секунд.</div>\n      </div>\n      <button class=\"close\" onclick=\"closeTop()\">Закрыть</button>\n    </div>\n    <div class=\"scanControls\">\n      <select id=\"topTimeout\" class=\"pill\">\n        <option value=\"25\">Быстро — 25 сек</option>\n        <option value=\"60\">Нормально — 60 сек</option>\n        <option value=\"300\">Долго — 5 минут</option>\n        <option value=\"0\">Полный скан — без таймаута</option>\n      </select>\n      <button class=\"pill active\" onclick=\"startTopScan()\">Сканировать</button>\n      <button class=\"pill danger\" onclick=\"cancelTopScan()\">Отменить</button>\n    </div>\n    <div id=\"topBody\">Выбери режим и нажми “Сканировать”.</div>\n  </div>\n</div>\n\n<script>\nlet allDisks = [];\nlet activeFilter = \"all\";\nlet currentHistoryDisk = \"\";\nlet currentRange = 86400;\nlet historyPoints = [];\nlet viewStart = null;\nlet viewEnd = null;\nlet drag = null;\nlet hoverX = null;\nlet ioMode = false;\nlet currentTopPath = \"\";\nlet currentTopName = \"\";\nlet currentTopJob = \"\";\nlet topPollTimer = null;\n\nfunction t(v){return v===undefined||v===null?\"\":String(v)}\nfunction n(v){return Number(v)||0}\nfunction fmtTs(ts){if(!ts)return \"—\";return new Date(ts*1000).toLocaleString()}\nfunction kind(d){if(d.kind===\"system\")return\"system / data\";if(d.kind===\"network\")return d.fs_type?\"network \"+d.fs_type:\"network\";return\"external mounted\"}\nfunction sourceHtml(d){let p=[];if(d.source)p.push(\"source: \"+t(d.source));if(d.host_path)p.push(\"path: \"+t(d.host_path));return '<div class=\"source\">'+p.join(\" · \")+'</div>'}\nfunction copyText(x){navigator.clipboard.writeText(x).catch(function(){})}\nfunction metricLabel(metric){if(metric===\"free_gb\")return\"Свободно GB\";if(metric===\"percent\")return\"Процент %\";if(metric===\"read_mbps\")return\"Чтение MB/s\";if(metric===\"write_mbps\")return\"Запись MB/s\";if(metric===\"io_util_percent\")return\"I/O util %\";return\"Занято GB\"}\nfunction valOf(p,metric){return n(p[metric])}\n\nfunction renderFilters(){\n  const items=[[\"all\",\"Все\"],[\"system\",\"System\"],[\"external\",\"External\"],[\"network\",\"Network\"]];\n  let html=\"\";\n  items.forEach(function(i){\n    html+='<button class=\"pill '+(activeFilter===i[0]?\"active\":\"\")+'\" data-filter=\"'+i[0]+'\">'+i[1]+'</button>';\n  });\n  const box=document.getElementById(\"filters\");\n  box.innerHTML=html;\n  box.querySelectorAll(\"button[data-filter]\").forEach(function(btn){\n    btn.addEventListener(\"click\",function(){\n      activeFilter=this.dataset.filter;\n      render();\n    });\n  });\n}\n\nfunction ioHtml(d){\n  if(!d.io_available){\n    const reason = d.kind===\"network\" ? \"для сетевых mount сейчас недоступно\" : \"нет block device\";\n    return '<div class=\"ioBox ioOff\"><div><div class=\"label\">I/O</div><div class=\"ioVal\">—</div></div><div><div class=\"label\">Статус</div><div class=\"ioVal\">'+reason+'</div></div><div><div class=\"label\">Device</div><div class=\"ioVal\">'+(d.io_device||\"—\")+'</div></div></div>';\n  }\n  return '<div class=\"ioBox\">'+\n    '<div><div class=\"label\">Чтение</div><div class=\"ioVal\">'+t(d.read_mbps)+' MB/s</div></div>'+\n    '<div><div class=\"label\">Запись</div><div class=\"ioVal\">'+t(d.write_mbps)+' MB/s</div></div>'+\n    '<div><div class=\"label\">I/O util</div><div class=\"ioVal\">'+t(d.io_util_percent)+'%</div></div>'+\n  '</div>';\n}\n\nfunction enc(v){return encodeURIComponent(t(v))}\nfunction dec(v){try{return decodeURIComponent(v)}catch(e){return v}}\n\nfunction card(d){\n  if(d.error){\n    return '<div class=\"card\"><div class=\"name\">'+t(d.name)+'</div><div class=\"badge\">'+kind(d)+'</div><p class=\"error\">'+t(d.error)+'</p>'+sourceHtml(d)+'</div>';\n  }\n  const pct=Math.max(0,Math.min(100,Number(d.percent)||0));\n  return '<div class=\"card\">'+\n    '<div class=\"top\"><div><div class=\"name\">'+t(d.name)+'</div><div class=\"badge\">'+kind(d)+'</div></div><div class=\"percent\">'+t(d.percent)+'%</div></div>'+\n    '<div class=\"bar\"><div class=\"mask\" style=\"left:'+pct+'%\"></div></div>'+\n    '<div class=\"stats\">'+\n      '<div class=\"stat\"><div class=\"label\">Занято</div><div class=\"value\">'+t(d.used_gb)+' GB</div></div>'+\n      '<div class=\"stat\"><div class=\"label\">Свободно</div><div class=\"value\">'+t(d.free_gb)+' GB</div></div>'+\n      '<div class=\"stat\"><div class=\"label\">Всего</div><div class=\"value\">'+t(d.total_gb)+' GB</div></div>'+\n    '</div>'+ioHtml(d)+sourceHtml(d)+\n    '<div class=\"mini\">Первый раз: '+fmtTs(d.first_seen)+'<br>Последний раз виден: '+fmtTs(d.last_seen)+'<br>Последнее изменение: '+fmtTs(d.last_changed)+'</div>'+\n    '<div class=\"actions\">'+\n      '<button class=\"btn act-history\" data-key=\"'+enc(d.key)+'\" data-name=\"'+enc(d.name)+'\">История</button>'+\n      '<button class=\"btn act-io\" data-key=\"'+enc(d.key)+'\" data-name=\"'+enc(d.name)+'\">Live I/O</button>'+\n      '<button class=\"btn act-top\" data-path=\"'+enc(d.host_path)+'\" data-name=\"'+enc(d.name)+'\">Топ папок</button>'+\n      '<button class=\"btn act-copy\" data-path=\"'+enc(d.host_path)+'\">Copy path</button>'+\n    '</div></div>';\n}\n\nfunction attachDiskActions(){\n  document.querySelectorAll(\".act-history\").forEach(function(btn){btn.addEventListener(\"click\",function(){openHistory(dec(this.dataset.key),dec(this.dataset.name));});});\n  document.querySelectorAll(\".act-io\").forEach(function(btn){btn.addEventListener(\"click\",function(){openIo(dec(this.dataset.key),dec(this.dataset.name));});});\n  document.querySelectorAll(\".act-top\").forEach(function(btn){btn.addEventListener(\"click\",function(){openTop(this.dataset.path,dec(this.dataset.name));});});\n  document.querySelectorAll(\".act-copy\").forEach(function(btn){btn.addEventListener(\"click\",function(){copyText(dec(this.dataset.path));});});\n}\n\nfunction render(){\n  renderFilters();\n  let disks=allDisks.slice();\n  if(activeFilter!==\"all\")disks=disks.filter(function(d){return d.kind===activeFilter});\n  disks.sort(function(a,b){return (Number(b.percent)||0)-(Number(a.percent)||0)});\n  let html=\"\";\n  disks.forEach(function(d){html+=card(d)});\n  document.getElementById(\"app\").innerHTML='<div class=\"grid\">'+html+'</div>';\n  attachDiskActions();\n}\n\nasync function load(){\n  try{\n    const r=await fetch('api/disks?ts='+Date.now(),{cache:'no-store'});\n    const d=await r.json();\n    allDisks=d.disks||[];\n    render();\n    let f='Последнее обновление: '+new Date().toLocaleString()+' · версия '+t(d.app_version)+' · запись истории/I/O каждые '+t(d.sample_interval_sec)+' сек. · хранение '+t(d.retention_days)+' дней';\n    if(d.hidden_unmounted_external_folders&&d.hidden_unmounted_external_folders.length){\n      f+='<details class=\"hidden\"><summary>Скрытые обычные папки без mount ('+d.hidden_unmounted_external_folders.length+')</summary>';\n      d.hidden_unmounted_external_folders.forEach(function(x){f+='<div>'+t(x.name)+' — '+t(x.host_path)+'</div>'});\n      f+='</details>';\n    }\n    document.getElementById(\"updated\").innerHTML=f;\n  }catch(e){\n    document.getElementById(\"app\").innerHTML='<div class=\"card\"><p class=\"error\">'+String(e)+'</p></div>';\n  }\n}\n\nfunction openHistory(key,name){\n  ioMode=false;\n  currentHistoryDisk=key;\n  currentRange=86400;\n  document.getElementById(\"historyTitle\").textContent=\"История: \"+name;\n  document.getElementById(\"historyOverlay\").style.display=\"flex\";\n  document.getElementById(\"metricSelect\").style.display=\"\";\n  document.getElementById(\"ioLegend\").style.display=\"none\";\n  viewStart=null;viewEnd=null;hoverX=null;\n  loadHistory();\n}\nfunction openIo(key,name){\n  ioMode=true;\n  currentHistoryDisk=key;\n  currentRange=300;\n  document.getElementById(\"historyTitle\").textContent=\"Live I/O: \"+name;\n  document.getElementById(\"historyOverlay\").style.display=\"flex\";\n  document.getElementById(\"metricSelect\").style.display=\"none\";\n  document.getElementById(\"ioLegend\").style.display=\"flex\";\n  viewStart=null;viewEnd=null;hoverX=null;\n  loadHistory();\n}\nfunction closeHistory(){document.getElementById(\"historyOverlay\").style.display=\"none\"}\nfunction setRange(sec){currentRange=sec;viewStart=null;viewEnd=null;loadHistory()}\nfunction resetChartView(){viewStart=null;viewEnd=null;hoverX=null;drawChart()}\n\nasync function loadHistory(){\n  if(!currentHistoryDisk)return;\n  const metric=ioMode ? \"read_mbps\" : document.getElementById(\"metricSelect\").value;\n  const r=await fetch('api/history?disk='+encodeURIComponent(currentHistoryDisk)+'&metric='+metric+'&range='+currentRange+'&ts='+Date.now(),{cache:'no-store'});\n  const d=await r.json();\n  historyPoints=d.points||[];\n  if(historyPoints.length){\n    if(viewStart===null)viewStart=historyPoints[0].ts*1000;\n    if(viewEnd===null)viewEnd=historyPoints[historyPoints.length-1].ts*1000;\n  }\n  drawChart();\n}\n\nfunction drawLine(ctx,pts,metric,x,y,color){\n  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;\n  pts.forEach(function(p,i){let xx=x(p.ts*1000),yy=y(valOf(p,metric));if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)});\n  ctx.stroke();\n}\n\nfunction roundRect(ctx,x,y,w,h,r){\n  ctx.beginPath();\n  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);\n  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);\n  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);\n  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();\n}\n\nfunction drawChart(){\n  const canvas=document.getElementById(\"historyCanvas\");\n  const box=canvas.getBoundingClientRect();\n  canvas.width=Math.max(600,Math.floor(box.width*devicePixelRatio));\n  canvas.height=Math.max(360,Math.floor(box.height*devicePixelRatio));\n  const ctx=canvas.getContext(\"2d\");\n  ctx.scale(devicePixelRatio,devicePixelRatio);\n  const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;\n  ctx.clearRect(0,0,w,h);\n  ctx.fillStyle=\"#020617\";ctx.fillRect(0,0,w,h);\n  const padL=70,padR=18,padT=26,padB=50;\n  const pts=historyPoints.filter(function(p){const ms=p.ts*1000;return viewStart===null||ms>=viewStart&&ms<=viewEnd});\n  ctx.strokeStyle=\"#1e293b\";ctx.lineWidth=1;\n  for(let i=0;i<6;i++){let yy=padT+(h-padT-padB)*i/5;ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(w-padR,yy);ctx.stroke()}\n  if(!pts.length){ctx.fillStyle=\"#94a3b8\";ctx.fillText(\"Пока нет данных. Подожди несколько секунд.\",padL,padT+30);return}\n\n  const metrics = ioMode ? [\"read_mbps\",\"write_mbps\"] : [document.getElementById(\"metricSelect\").value];\n  let values=[];\n  pts.forEach(function(p){metrics.forEach(function(m){values.push(valOf(p,m))})});\n  let min=Math.min(...values),max=Math.max(...values);\n  if(min===max){min-=1;max+=1}\n  if(ioMode){min=0}\n\n  const x0=viewStart||pts[0].ts*1000,x1=viewEnd||pts[pts.length-1].ts*1000;\n  function x(ms){return padL+(ms-x0)/(x1-x0)*(w-padL-padR)}\n  function y(v){return h-padB-(v-min)/(max-min)*(h-padT-padB)}\n  ctx.fillStyle=\"#94a3b8\";ctx.font=\"12px system-ui\";\n  for(let i=0;i<6;i++){let val=min+(max-min)*(5-i)/5;let yy=padT+(h-padT-padB)*i/5;ctx.fillText(val.toFixed(1),8,yy+4)}\n  if(ioMode){\n    drawLine(ctx,pts,\"read_mbps\",x,y,\"#60a5fa\");\n    drawLine(ctx,pts,\"write_mbps\",x,y,\"#f59e0b\");\n    ctx.fillStyle=\"#cbd5e1\";ctx.fillText(\"MB/s\",padL,padT-8);\n  }else{\n    const metric=document.getElementById(\"metricSelect\").value;\n    drawLine(ctx,pts,metric,x,y,\"#60a5fa\");\n    ctx.fillStyle=\"#cbd5e1\";ctx.fillText(metricLabel(metric),padL,padT-8);\n  }\n\n  if(hoverX!==null && hoverX>=padL && hoverX<=w-padR){\n    const hoverMs=x0+(hoverX-padL)/(w-padL-padR)*(x1-x0);\n    let nearest=pts[0],best=Math.abs(pts[0].ts*1000-hoverMs);\n    pts.forEach(function(p){let diff=Math.abs(p.ts*1000-hoverMs);if(diff<best){best=diff;nearest=p}});\n    const hx=x(nearest.ts*1000);\n    ctx.strokeStyle=\"#64748b\";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(hx,padT);ctx.lineTo(hx,h-padB);ctx.stroke();\n    const boxW=244,boxH=112;\n    let bx=hx+12;if(bx+boxW>w-padR)bx=hx-boxW-12;\n    let by=padT+12;\n    ctx.fillStyle=\"rgba(15,23,42,.96)\";ctx.strokeStyle=\"#334155\";ctx.lineWidth=1;\n    roundRect(ctx,bx,by,boxW,boxH,10);ctx.fill();ctx.stroke();\n    ctx.fillStyle=\"#e5e7eb\";ctx.font=\"12px system-ui\";\n    ctx.fillText(new Date(nearest.ts*1000).toLocaleString(),bx+10,by+20);\n    ctx.fillStyle=\"#bfdbfe\";ctx.fillText(\"Занято: \"+n(nearest.used_gb).toFixed(1)+\" GB\",bx+10,by+40);\n    ctx.fillStyle=\"#bbf7d0\";ctx.fillText(\"Свободно: \"+n(nearest.free_gb).toFixed(1)+\" GB\",bx+10,by+58);\n    ctx.fillStyle=\"#fde68a\";ctx.fillText(\"Процент: \"+n(nearest.percent).toFixed(1)+\"%\",bx+10,by+76);\n    ctx.fillStyle=\"#93c5fd\";ctx.fillText(\"Чтение: \"+n(nearest.read_mbps).toFixed(3)+\" MB/s\",bx+10,by+94);\n    ctx.fillStyle=\"#fdba74\";ctx.fillText(\"Запись: \"+n(nearest.write_mbps).toFixed(3)+\" MB/s\",bx+122,by+94);\n  }\n\n  ctx.fillStyle=\"#cbd5e1\";\n  ctx.fillText(new Date(x0).toLocaleString(),padL,h-16);\n  ctx.textAlign=\"right\";ctx.fillText(new Date(x1).toLocaleString(),w-padR,h-16);ctx.textAlign=\"left\";\n}\n\nconst historyCanvas = document.getElementById(\"historyCanvas\");\nhistoryCanvas.addEventListener(\"mousemove\", function(e){\n  const rect=e.target.getBoundingClientRect();\n  hoverX=e.clientX-rect.left;\n  if(!drag)drawChart();\n});\nhistoryCanvas.addEventListener(\"mouseleave\", function(){\n  hoverX=null;\n  drawChart();\n});\nhistoryCanvas.addEventListener(\"wheel\",function(e){\n  e.preventDefault();\n  if(!historyPoints.length)return;\n  const rect=e.target.getBoundingClientRect();\n  const mx=(e.clientX-rect.left)/rect.width;\n  const start=viewStart,end=viewEnd,span=end-start;\n  const factor=e.deltaY<0?0.8:1.25;\n  const center=start+span*mx;\n  let ns=center-(center-start)*factor;\n  let ne=center+(end-center)*factor;\n  const allS=historyPoints[0].ts*1000,allE=historyPoints[historyPoints.length-1].ts*1000;\n  if(ns<allS)ns=allS;if(ne>allE)ne=allE;\n  if(ne-ns>1000){viewStart=ns;viewEnd=ne;drawChart()}\n},{passive:false});\nhistoryCanvas.addEventListener(\"mousedown\",function(e){\n  drag={x:e.clientX,start:viewStart,end:viewEnd};\n});\ndocument.addEventListener(\"mousemove\",function(e){\n  if(!drag||!historyPoints.length)return;\n  const rect=historyCanvas.getBoundingClientRect();\n  const dx=e.clientX-drag.x;\n  const span=drag.end-drag.start;\n  const shift=-dx/rect.width*span;\n  const allS=historyPoints[0].ts*1000,allE=historyPoints[historyPoints.length-1].ts*1000;\n  let ns=drag.start+shift,ne=drag.end+shift;\n  if(ns<allS){ne+=allS-ns;ns=allS}\n  if(ne>allE){ns-=ne-allE;ne=allE}\n  viewStart=ns;viewEnd=ne;drawChart();\n});\ndocument.addEventListener(\"mouseup\",function(){drag=null});\n\nfunction openTop(encodedPath,name){\n  currentTopPath=encodedPath;\n  currentTopName=name;\n  currentTopJob=\"\";\n  document.getElementById(\"topTitle\").textContent=\"Топ папок: \"+name;\n  document.getElementById(\"topOverlay\").style.display=\"flex\";\n  document.getElementById(\"topBody\").innerHTML='Выбери режим и нажми “Сканировать”.';\n}\nfunction closeTop(){\n  document.getElementById(\"topOverlay\").style.display=\"none\";\n  if(topPollTimer){clearInterval(topPollTimer);topPollTimer=null}\n}\nasync function startTopScan(){\n  if(topPollTimer){clearInterval(topPollTimer);topPollTimer=null}\n  const timeout=document.getElementById(\"topTimeout\").value;\n  document.getElementById(\"topBody\").innerHTML='<div class=\"spinnerWrap\"><div class=\"spinner\"></div><div>Запускаю сканирование...</div></div>';\n  const r=await fetch('api/top/start?host_path='+currentTopPath+'&limit=20&timeout='+encodeURIComponent(timeout)+'&ts='+Date.now(),{cache:'no-store'});\n  const d=await r.json();\n  if(d.error){document.getElementById(\"topBody\").innerHTML='<p class=\"error\">'+t(d.error)+'</p>';return}\n  currentTopJob=d.job_id;\n  topPollTimer=setInterval(pollTop,1000);\n  pollTop();\n}\nasync function cancelTopScan(){\n  if(!currentTopJob)return;\n  await fetch('api/top/cancel?job_id='+encodeURIComponent(currentTopJob)+'&ts='+Date.now(),{cache:'no-store'});\n}\nasync function pollTop(){\n  if(!currentTopJob)return;\n  const r=await fetch('api/top/status?job_id='+encodeURIComponent(currentTopJob)+'&ts='+Date.now(),{cache:'no-store'});\n  const d=await r.json();\n  renderTopStatus(d);\n  if(d.status===\"done\"||d.status===\"error\"||d.status===\"cancelled\"){\n    if(topPollTimer){clearInterval(topPollTimer);topPollTimer=null}\n  }\n}\nfunction renderTopStatus(d){\n  if(d.error){document.getElementById(\"topBody\").innerHTML='<p class=\"error\">'+t(d.error)+'</p>';return}\n  let html=\"\";\n  if(d.status===\"running\"||d.status===\"queued\"){\n    html+='<div class=\"spinnerWrap\"><div class=\"spinner\"></div><div><b>Сканирование идёт...</b><div class=\"pathNow\">Сейчас: '+t(d.current_path)+'</div></div></div>';\n  }\n  if(d.status===\"cancelled\")html+='<p class=\"warnText\">Сканирование отменено.</p>';\n  if(d.status===\"done\"&&d.timed_out){\n    html+='<p class=\"warnText\">Сканирование упёрлось в лимит '+t(d.timeout_sec)+' сек. Можно выбрать режим дольше или “Полный скан — без таймаута” и запустить заново.</p>';\n  }\n  if(d.status===\"done\"&&!d.timed_out)html+='<p>Готово.</p>';\n  html+='<div class=\"progress\">Просмотрено элементов: '+t(d.scanned_entries||0)+' · файлов: '+t(d.scanned_files||0)+' · ошибок доступа: '+t(d.errors||0)+'</div>';\n  const items=d.items||[];\n  html+='<table class=\"table\"><tr><th>Папка/файл</th><th>Тип</th><th>Размер</th><th>Путь</th></tr>';\n  items.forEach(function(x){html+='<tr><td>'+t(x.name)+'</td><td>'+t(x.type)+'</td><td>'+t(x.size_gb)+' GB</td><td>'+t(x.host_path)+'</td></tr>'});\n  html+='</table>';\n  document.getElementById(\"topBody\").innerHTML=html;\n}\n\nload();\nsetInterval(load,5000);\nsetInterval(function(){if(document.getElementById(\"historyOverlay\").style.display===\"flex\")loadHistory()},5000);\n</script>\n</body>\n</html>"


        class Handler(BaseHTTPRequestHandler):
            def send_json(self, payload):
                body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "application/json; charset=utf-8")
                self.send_header("Cache-Control", "no-store")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            def do_GET(self):
                parsed = urlparse(self.path)
                path = parsed.path.rstrip("/")
                query = parse_qs(parsed.query)

                if path == "":
                    body = HTML.encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html; charset=utf-8")
                    self.send_header("Cache-Control", "no-store")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                if path == "/api/disks":
                    self.send_json(get_current_data())
                    return

                if path == "/api/history":
                    self.send_json(history_data(query))
                    return

                if path == "/api/top/start":
                    self.send_json(start_top_job(query))
                    return

                if path == "/api/top/status":
                    self.send_json(top_status(query))
                    return

                if path == "/api/top/cancel":
                    self.send_json(cancel_top_job(query))
                    return

                self.send_response(404)
                self.end_headers()

            def log_message(self, *args):
                return


        init_db()
        threading.Thread(target=sampler_loop, daemon=True).start()
        ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
