services:
  app_proxy:
    environment:
      APP_HOST: ilya-disk-status_server_1
      APP_PORT: 8080

  server:
    image: python:3.12-alpine
    restart: on-failure
    volumes:
      - ${UMBREL_ROOT}:/umbrel-root:ro
      - ${UMBREL_ROOT}/external:/external:ro,rslave
    command:
      - sh
      - -c
      - |
        cat > /tmp/server.py <<'PY'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json
        import os
        import time

        SYSTEM_PATH = "/umbrel-root"
        EXTERNAL_ROOT = "/external"

        def gib(bytes_value):
            return round(bytes_value / 1073741824, 1)

        def read_mount_points():
            points = set()
            try:
                with open("/proc/self/mountinfo", "r", encoding="utf-8") as f:
                    for line in f:
                        parts = line.split()
                        if len(parts) >= 5:
                            points.add(parts[4].replace("\\040", " "))
            except Exception:
                pass
            return points

        def disk_info(name, path, kind, parent_dev=None, mount_points=None):
            st_path = os.stat(path)
            st = os.statvfs(path)
            total = st.f_blocks * st.f_frsize
            free = st.f_bavail * st.f_frsize
            used = total - free
            percent = round((used / total) * 100, 1) if total else 0

            is_mounted = True
            if kind == "external":
                is_mounted = False
                if parent_dev is not None and st_path.st_dev != parent_dev:
                    is_mounted = True
                if mount_points and path in mount_points:
                    is_mounted = True

            return {
                "name": name,
                "path": path,
                "kind": kind,
                "device_id": st_path.st_dev,
                "mounted": is_mounted,
                "total_gb": gib(total),
                "used_gb": gib(used),
                "free_gb": gib(free),
                "percent": percent,
            }

        def get_data():
            result = []
            seen_devices = set()
            mount_points = read_mount_points()

            try:
                system = disk_info("UMBREL_DATA", SYSTEM_PATH, "system", mount_points=mount_points)
                result.append(system)
                seen_devices.add(system["device_id"])
            except Exception as err:
                result.append({
                    "name": "UMBREL_DATA",
                    "path": SYSTEM_PATH,
                    "kind": "system",
                    "mounted": False,
                    "error": str(err),
                })

            try:
                parent_dev = os.stat(EXTERNAL_ROOT).st_dev
                names = sorted(os.listdir(EXTERNAL_ROOT))
            except Exception:
                parent_dev = None
                names = []

            for dirname in names:
                path = os.path.join(EXTERNAL_ROOT, dirname)
                if not os.path.isdir(path):
                    continue

                try:
                    info = disk_info(dirname, path, "external", parent_dev=parent_dev, mount_points=mount_points)

                    if not info["mounted"]:
                        info["status"] = "waiting_for_mount"
                        result.append(info)
                        continue

                    if info["device_id"] in seen_devices:
                        info["status"] = "duplicate_device_hidden"
                        continue

                    info["status"] = "mounted"
                    result.append(info)
                    seen_devices.add(info["device_id"])
                except Exception as err:
                    result.append({
                        "name": dirname,
                        "path": path,
                        "kind": "external",
                        "mounted": False,
                        "error": str(err),
                    })

            return {
                "disks": result,
                "updated_at": int(time.time()),
            }

        def page():
            return """<!doctype html>
        <html lang="ru">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Disk Status</title>
          <style>
            * { box-sizing: border-box; }
            body {
              margin: 0;
              font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              background: radial-gradient(circle at top, #1e293b, #020617 70%);
              color: #e5e7eb;
            }
            .wrap {
              max-width: 1100px;
              margin: 34px auto;
              padding: 0 20px 40px;
            }
            h1 {
              font-size: 36px;
              margin: 0 0 8px;
              letter-spacing: -0.03em;
            }
            .sub {
              color: #94a3b8;
              margin-bottom: 24px;
            }
            .grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
              gap: 18px;
            }
            .card {
              background: rgba(15, 23, 42, 0.92);
              border: 1px solid #243244;
              border-radius: 22px;
              padding: 22px;
              box-shadow: 0 16px 40px rgba(0,0,0,.35);
            }
            .card.waiting {
              opacity: .65;
              border-style: dashed;
            }
            .top {
              display: flex;
              justify-content: space-between;
              gap: 16px;
              align-items: baseline;
              margin-bottom: 14px;
            }
            .name {
              font-size: 22px;
              font-weight: 800;
              word-break: break-word;
            }
            .badge {
              display: inline-block;
              margin-top: 6px;
              color: #93c5fd;
              font-size: 12px;
              font-weight: 700;
              letter-spacing: .02em;
              text-transform: uppercase;
            }
            .percent {
              font-size: 34px;
              font-weight: 900;
              white-space: nowrap;
            }
            .bar {
              height: 20px;
              border-radius: 999px;
              background: #1f2937;
              overflow: hidden;
              margin: 16px 0;
              border: 1px solid #334155;
            }
            .fill {
              height: 100%;
              width: 0%;
              background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
              border-radius: 999px;
              transition: width .35s ease;
            }
            .stats {
              display: grid;
              grid-template-columns: repeat(3, minmax(0, 1fr));
              gap: 10px;
            }
            .stat {
              background: #020617;
              border: 1px solid #1e293b;
              border-radius: 14px;
              padding: 12px;
            }
            .label {
              color: #94a3b8;
              font-size: 13px;
              margin-bottom: 5px;
            }
            .value {
              font-size: 18px;
              font-weight: 800;
            }
            .error {
              color: #f87171;
              font-weight: 800;
              word-break: break-word;
            }
            .hint {
              color: #fbbf24;
              font-weight: 700;
            }
            .footer {
              margin-top: 18px;
              color: #64748b;
              font-size: 13px;
            }
            @media (max-width: 800px) {
              .grid { grid-template-columns: 1fr; }
              .stats { grid-template-columns: 1fr; }
              .top { flex-direction: column; }
            }
          </style>
        </head>
        <body>
          <div class="wrap">
            <h1>Disk Status</h1>
            <div class="sub">Системный раздел Umbrel и все внешние диски из папки external. Обновление каждые 5 секунд.</div>
            <div id="app">Загрузка...</div>
            <div class="footer" id="updated"></div>
          </div>

          <script>
            function text(v) {
              if (v === undefined || v === null) {
                return "";
              }
              return String(v);
            }

            function kindLabel(d) {
              if (d.kind === "system") {
                return "system / data";
              }
              if (d.mounted) {
                return "external mounted";
              }
              return "external waiting";
            }

            function diskHtml(d) {
              const cardClass = d.mounted ? "card" : "card waiting";

              if (d.error) {
                return '<div class="' + cardClass + '">' +
                  '<div class="name">' + text(d.name) + '</div>' +
                  '<div class="badge">' + kindLabel(d) + '</div>' +
                  '<p class="error">' + text(d.error) + '</p>' +
                  '<p>' + text(d.path) + '</p>' +
                  '</div>';
              }

              if (!d.mounted) {
                return '<div class="' + cardClass + '">' +
                  '<div class="top">' +
                    '<div><div class="name">' + text(d.name) + '</div><div class="badge">' + kindLabel(d) + '</div></div>' +
                    '<div class="percent">—</div>' +
                  '</div>' +
                  '<p class="hint">Папка есть, но отдельный диск сейчас не смонтирован. Жду mount.</p>' +
                  '<p>' + text(d.path) + '</p>' +
                '</div>';
              }

              return '<div class="' + cardClass + '">' +
                '<div class="top">' +
                  '<div><div class="name">' + text(d.name) + '</div><div class="badge">' + kindLabel(d) + '</div></div>' +
                  '<div class="percent">' + text(d.percent) + '%</div>' +
                '</div>' +
                '<div class="bar"><div class="fill" style="width:' + text(d.percent) + '%"></div></div>' +
                '<div class="stats">' +
                  '<div class="stat"><div class="label">Занято</div><div class="value">' + text(d.used_gb) + ' GB</div></div>' +
                  '<div class="stat"><div class="label">Свободно</div><div class="value">' + text(d.free_gb) + ' GB</div></div>' +
                  '<div class="stat"><div class="label">Всего</div><div class="value">' + text(d.total_gb) + ' GB</div></div>' +
                '</div>' +
              '</div>';
            }

            async function load() {
              try {
                const res = await fetch('api/disks?ts=' + Date.now(), { cache: 'no-store' });
                const data = await res.json();
                let result = "";

                data.disks.forEach(function(d) {
                  result += diskHtml(d);
                });

                document.getElementById('app').innerHTML = '<div class="grid">' + result + '</div>';
                document.getElementById('updated').textContent = 'Последнее обновление: ' + new Date().toLocaleString();
              } catch (err) {
                document.getElementById('app').innerHTML =
                  '<div class="card"><p class="error">' + String(err) + '</p></div>';
              }
            }

            load();
            setInterval(load, 5000);
          </script>
        </body>
        </html>"""

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                path = self.path.split("?", 1)[0].rstrip("/")
                if path == "":
                    body = page().encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html; charset=utf-8")
                    self.send_header("Cache-Control", "no-store")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                if path == "/api/disks":
                    body = json.dumps(get_data(), ensure_ascii=False).encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json; charset=utf-8")
                    self.send_header("Cache-Control", "no-store")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                self.send_response(404)
                self.end_headers()

            def log_message(self, format, *args):
                return

        HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
        PY

        python /tmp/server.py
