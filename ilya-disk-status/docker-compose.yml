        .progress{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;margin-top:10px}
        .pathNow{color:#94a3b8;overflow-wrap:anywhere;font-size:12px;margin-top:6px}
        .warnText{color:#fbbf24}
        .legend{display:flex;gap:12px;align-items:center;color:#94a3b8;font-size:12px;margin:2px 0 10px}
        .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
        @media(max-width:800px){.grid{grid-template-columns:1fr}.stats,.ioBox{grid-template-columns:1fr}.top{flex-direction:column}.chartBox{height:420px}}
        </style>
        </head>
        <body>
        <div class="wrap">
          <h1>Disk Status</h1>
          <div class="sub">Системный раздел, реальные внешние диски и сетевые mount-диски. История/I/O пишутся каждую секунду. Live запись считается по росту занятого места, поэтому ближе к скорости копирования в Umbrel/Windows; сглаживание 8 сек.</div>
          <div class="toolbar" id="filters"></div>
          <div id="app">Загрузка...</div>
          <div class="footer" id="updated"></div>
        </div>

        <div class="overlay" id="historyOverlay">
          <div class="modal">
            <div class="modalHead">
              <div>
                <div class="modalTitle" id="historyTitle">История</div>
                <div class="mini" id="historyHint">Колесо мыши — приблизить/отдалить. Зажать мышь и тянуть — двигать диапазон. Наведи мышкой на линию — увидишь точные значения.</div>
              </div>
              <button class="close" onclick="closeHistory()">Закрыть</button>
            </div>
            <div class="chartControls">
              <select id="metricSelect" class="pill" onchange="loadHistory()">
                <option value="used_gb">Занято GB</option>
                <option value="free_gb">Свободно GB</option>
                <option value="percent">Процент %</option>
                <option value="read_mbps">Чтение MB/s</option>
                <option value="write_mbps">Запись MB/s</option>
                <option value="io_util_percent">I/O util %</option>
              </select>
              <button class="pill" onclick="setRange(300)">5м</button>
              <button class="pill" onclick="setRange(3600)">1ч</button>
              <button class="pill" onclick="setRange(21600)">6ч</button>
              <button class="pill" onclick="setRange(86400)">24ч</button>
              <button class="pill" onclick="setRange(604800)">7д</button>
              <button class="pill" onclick="setRange(2592000)">30д</button>
              <button class="pill" onclick="setRange(0)">Всё</button>
              <button class="pill" onclick="resetChartView()">Сбросить</button>
            </div>
            <div class="legend" id="ioLegend" style="display:none">
              <span><span class="dot" style="background:#60a5fa"></span> чтение MB/s</span>
              <span><span class="dot" style="background:#f59e0b"></span> запись MB/s</span>
            </div>
            <div class="chartBox"><canvas id="historyCanvas"></canvas></div>
          </div>
        </div>

        <div class="overlay" id="topOverlay">
          <div class="modal">
            <div class="modalHead">
              <div>
                <div class="modalTitle" id="topTitle">Топ папок</div>
                <div class="mini">Сканирование read-only: данные не меняет, но может грузить диск/сеть. Для больших сетевых дисков лучше начать с 25–60 секунд.</div>
              </div>
              <button class="close" onclick="closeTop()">Закрыть</button>
            </div>
            <div class="scanControls">
              <select id="topTimeout" class="pill">
                <option value="25">Быстро — 25 сек</option>
                <option value="60">Нормально — 60 сек</option>
                <option value="300">Долго — 5 минут</option>
                <option value="0">Полный скан — без таймаута</option>
              </select>
              <button class="pill active" onclick="startTopScan()">Сканировать</button>
              <button class="pill danger" onclick="cancelTopScan()">Отменить</button>
            </div>
            <div id="topBody">Выбери режим и нажми “Сканировать”.</div>
          </div>
        </div>

        <script>
        let allDisks = [];
        let activeFilter = "all";
        let currentHistoryDisk = "";
        let currentRange = 86400;
        let historyPoints = [];
        let viewStart = null;
        let viewEnd = null;
        let drag = null;
        let hoverX = null;
        let ioMode = false;
        let currentTopPath = "";
        let currentTopName = "";
        let currentTopJob = "";
        let topPollTimer = null;
        let latestHistoryStats = null;

        function t(v){return v===undefined||v===null?"":String(v)}
        function n(v){return Number(v)||0}
        function fmtTs(ts){if(!ts)return "—";return new Date(ts*1000).toLocaleString()}
        function kind(d){if(d.kind==="system")return"system / data";if(d.kind==="network")return d.fs_type?"network "+d.fs_type:"network";return"external mounted"}
        function sourceHtml(d){let p=[];if(d.source)p.push("source: "+t(d.source));if(d.host_path)p.push("path: "+t(d.host_path));return '<div class="source">'+p.join(" · ")+'</div>'}
        function copyText(x){navigator.clipboard.writeText(x).catch(function(){})}
        function metricLabel(metric){if(metric==="free_gb")return"Свободно GB";if(metric==="percent")return"Процент %";if(metric==="read_mbps")return"Чтение MB/s";if(metric==="write_mbps")return"Запись MB/s";if(metric==="io_util_percent")return"I/O util %";return"Занято GB"}
        function valOf(p,metric){return n(p[metric])}

        function renderFilters(){
          const items=[["all","Все"],["system","System"],["external","External"],["network","Network"]];
          let html="";
          items.forEach(function(i){
            html+='<button class="pill '+(activeFilter===i[0]?"active":"")+'" data-filter="'+i[0]+'">'+i[1]+'</button>';
          });
          const totalMb = latestHistoryStats ? t(latestHistoryStats.db_size_mb) : "0";
          const rows = latestHistoryStats ? t(latestHistoryStats.total_rows) : "0";
          html+='<button class="pill danger" id="clearHistoryBtn" title="История всех дисков занимает примерно '+totalMb+' MB, записей: '+rows+'">Очистить историю</button>';
          html+='<span class="historyInfo" title="raw 1s: 24ч; compact 10s: 7д; compact 60s: 30д">История: '+totalMb+' MB · '+rows+' записей</span>';
          document.getElementById("filters").innerHTML=html;
          document.querySelectorAll("[data-filter]").forEach(function(btn){
            btn.addEventListener("click",function(){activeFilter=btn.dataset.filter;render()});
          });
          const clearBtn=document.getElementById("clearHistoryBtn");
          if(clearBtn)clearBtn.addEventListener("click",clearHistory);
        }

        async function clearHistory(){
          const totalMb = latestHistoryStats ? latestHistoryStats.db_size_mb : 0;
          const rows = latestHistoryStats ? latestHistoryStats.total_rows : 0;
          const ok = confirm("Точно стереть всю историю дисков?\\n\\nБудет удалено примерно: "+totalMb+" MB\\nЗаписей: "+rows+"\\n\\nТекущие карточки дисков останутся, но графики начнутся заново.");
          if(!ok)return;
          const r=await fetch("api/history/clear?ts="+Date.now(),{cache:"no-store"});
          const d=await r.json();
          if(d.ok){
            alert("История очищена.");
            load();
          }else{
            alert("Не получилось очистить историю.");
          }
        }

        function ioHtml(d){
          const key=t(d.key);
          if(!d.io_available){
            const reason = d.kind==="network" ? "для сетевых mount сейчас недоступно" : "нет block device";
            return '<div class="ioBox ioOff" data-io-key="'+key+'" title="Live I/O обновляется отдельно от карточек">'+
              '<div><div class="label">I/O</div><div class="ioVal readVal">—</div></div>'+
              '<div><div class="label">Статус</div><div class="ioVal writeVal">'+reason+'</div></div>'+
              '<div><div class="label">Device</div><div class="ioVal utilVal">'+(d.io_device||"—")+'</div></div>'+
            '</div>';
          }
          return '<div class="ioBox" data-io-key="'+key+'" title="Запись: при копировании показывается рост занятого места, ближе к Umbrel/Windows; fallback — block I/O. Сглаживание ~8 сек">'+
            '<div><div class="label">Чтение</div><div class="ioVal readVal">'+t(d.read_mbps)+' MB/s</div></div>'+
            '<div><div class="label">Запись</div><div class="ioVal writeVal">'+t(d.write_mbps)+' MB/s</div></div>'+
            '<div><div class="label">I/O util</div><div class="ioVal utilVal">'+t(d.io_util_percent)+'%</div></div>'+
          '</div>';
        }

        function card(d){
          if(d.error){
            return '<div class="card"><div class="name">'+t(d.name)+'</div><div class="badge">'+kind(d)+'</div><p class="error">'+t(d.error)+'</p>'+sourceHtml(d)+'</div>';
          }
          const pct=Math.max(0,Math.min(100,Number(d.percent)||0));
          const histTitle='История этого диска: примерно '+t(d.history_est_mb||0)+' MB, записей: '+t(d.history_rows||0);
          return '<div class="card" data-key="'+t(d.key)+'">'+
            '<div class="top"><div><div class="name">'+t(d.name)+'</div><div class="badge">'+kind(d)+'</div></div><div class="percent">'+t(d.percent)+'%</div></div>'+
            '<div class="bar"><div class="mask" style="left:'+pct+'%"></div></div>'+
            '<div class="stats">'+
              '<div class="stat"><div class="label">Занято</div><div class="value">'+t(d.used_gb)+' GB</div></div>'+
              '<div class="stat"><div class="label">Свободно</div><div class="value">'+t(d.free_gb)+' GB</div></div>'+
              '<div class="stat"><div class="label">Всего</div><div class="value">'+t(d.total_gb)+' GB</div></div>'+
            '</div>'+
            ioHtml(d)+
            sourceHtml(d)+
            '<div class="mini">Первый раз: '+fmtTs(d.first_seen)+'<br>Последний раз виден: '+fmtTs(d.last_seen)+'<br>Последнее изменение: '+fmtTs(d.last_changed)+'<br>История диска: '+t(d.history_est_mb||0)+' MB · '+t(d.history_rows||0)+' записей</div>'+
            '<div class="actions">'+
              '<button class="btn historyBtn" title="'+histTitle+'">История</button>'+
              '<button class="btn ioBtn">Live I/O</button>'+
              '<button class="btn topBtn">Топ папок</button>'+
              '<button class="btn copyBtn">Copy path</button>'+
            '</div>'+
          '</div>';
        }

        function bindCardButtons(){
          document.querySelectorAll(".card").forEach(function(el){
            const key=el.dataset.key;
            const d=allDisks.find(function(x){return x.key===key});
            if(!d)return;
            const hist=el.querySelector(".historyBtn");
            const io=el.querySelector(".ioBtn");
            const top=el.querySelector(".topBtn");
            const copy=el.querySelector(".copyBtn");
            if(hist)hist.addEventListener("click",function(){openHistory(d.key,d.name)});
            if(io)io.addEventListener("click",function(){openIo(d.key,d.name)});
            if(top)top.addEventListener("click",function(){openTop(encodeURIComponent(t(d.host_path)),d.name)});
            if(copy)copy.addEventListener("click",function(){copyText(t(d.host_path))});
          });
        }

        function render(){
          renderFilters();
          let disks=allDisks.slice();
          if(activeFilter!=="all")disks=disks.filter(function(d){return d.kind===activeFilter});
          disks.sort(function(a,b){return (Number(b.percent)||0)-(Number(a.percent)||0)});
          let html="";
          disks.forEach(function(d){html+=card(d)});
          document.getElementById("app").innerHTML='<div class="grid">'+html+'</div>';
          bindCardButtons();
        }

        async function loadLiveIo(){
          try{
            const r=await fetch('api/live?ts='+Date.now(),{cache:'no-store'});
            const d=await r.json();
            const items=d.disks||[];
            items.forEach(function(io){
              let box=null;
              document.querySelectorAll(".ioBox").forEach(function(el){
                if(el.dataset.ioKey===io.key)box=el;
              });
              if(!box)return;

              const read=box.querySelector(".readVal");
              const write=box.querySelector(".writeVal");
              const util=box.querySelector(".utilVal");

              if(io.io_available){
                box.classList.remove("ioOff");
                if(read)read.textContent=t(io.read_mbps)+" MB/s";
                if(write)write.textContent=t(io.write_mbps)+" MB/s";
                if(util)util.textContent=t(io.io_util_percent)+"%";
                box.title="Live I/O: "+new Date().toLocaleTimeString()+" · режим записи: "+t(io.write_mode)+" · files "+t(io.file_write_mbps)+" MB/s · block "+t(io.block_write_mbps)+" MB/s · сглаживание "+t(io.smooth_window_sec || 8)+" сек.";
              }else{
                box.classList.add("ioOff");
              }

              const cached=allDisks.find(function(x){return x.key===io.key});
              if(cached){
                cached.read_mbps=io.read_mbps;
                cached.write_mbps=io.write_mbps;
                cached.write_mode=io.write_mode;
                cached.block_write_mbps=io.block_write_mbps;
                cached.file_write_mbps=io.file_write_mbps;
                cached.read_iops=io.read_iops;
                cached.write_iops=io.write_iops;
                cached.io_util_percent=io.io_util_percent;
              }
            });
          }catch(e){}
        }

        async function load(){
          try{
            const r=await fetch('api/disks?ts='+Date.now(),{cache:'no-store'});
            const d=await r.json();
            allDisks=d.disks||[];
            latestHistoryStats=d.history_stats||null;
            render();
            let f='Последнее обновление: '+new Date().toLocaleString()+' · версия '+t(d.app_version)+' · история/I/O каждую '+t(d.sample_interval_sec)+' сек. · live запись ближе к Umbrel/Windows · сглаживание 8 сек. · policy: 1s/24h, 10s/7d, 60s/30d';
            if(d.history_stats){
              f+=' · база истории: '+t(d.history_stats.db_size_mb)+' MB · записей: '+t(d.history_stats.total_rows);
            }
            if(d.hidden_unmounted_external_folders&&d.hidden_unmounted_external_folders.length){
              f+='<details class="hidden"><summary>Скрытые обычные папки без mount ('+d.hidden_unmounted_external_folders.length+')</summary>';
              d.hidden_unmounted_external_folders.forEach(function(x){f+='<div>'+t(x.name)+' — '+t(x.host_path)+'</div>'});
              f+='</details>';
            }
            document.getElementById("updated").innerHTML=f;
          }catch(e){
            document.getElementById("app").innerHTML='<div class="card"><p class="error">'+String(e)+'</p></div>';
          }
        }

        function openHistory(key,name){
          ioMode=false;
          currentHistoryDisk=key;
          currentRange=86400;
          document.getElementById("historyTitle").textContent="История: "+name;
          document.getElementById("historyOverlay").style.display="flex";
          document.getElementById("metricSelect").style.display="";
          document.getElementById("ioLegend").style.display="none";
          viewStart=null;viewEnd=null;hoverX=null;
          loadHistory();
        }
        function openIo(key,name){
          ioMode=true;
          currentHistoryDisk=key;
          currentRange=300;
          document.getElementById("historyTitle").textContent="Live I/O: "+name;
          document.getElementById("historyOverlay").style.display="flex";
          document.getElementById("metricSelect").style.display="none";
          document.getElementById("ioLegend").style.display="flex";
          viewStart=null;viewEnd=null;hoverX=null;
          loadHistory();
        }
        function closeHistory(){document.getElementById("historyOverlay").style.display="none"}
        function setRange(sec){currentRange=sec;viewStart=null;viewEnd=null;loadHistory()}
        function resetChartView(){viewStart=null;viewEnd=null;hoverX=null;drawChart()}

        async function loadHistory(){
          if(!currentHistoryDisk)return;
          const metric=ioMode ? "read_mbps" : document.getElementById("metricSelect").value;
          const r=await fetch('api/history?disk='+encodeURIComponent(currentHistoryDisk)+'&metric='+metric+'&range='+currentRange+'&ts='+Date.now(),{cache:'no-store'});
          const d=await r.json();
          historyPoints=d.points||[];
          if(historyPoints.length){
            if(viewStart===null)viewStart=historyPoints[0].ts*1000;
            if(viewEnd===null)viewEnd=historyPoints[historyPoints.length-1].ts*1000;
          }
          drawChart();
        }

        function drawLine(ctx,pts,metric,x,y,color){
          ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
          pts.forEach(function(p,i){let xx=x(p.ts*1000),yy=y(valOf(p,metric));if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)});
          ctx.stroke();
        }

        function drawChart(){
          const canvas=document.getElementById("historyCanvas");
          const box=canvas.getBoundingClientRect();
          canvas.width=Math.max(600,Math.floor(box.width*devicePixelRatio));
          canvas.height=Math.max(360,Math.floor(box.height*devicePixelRatio));
          const ctx=canvas.getContext("2d");
          ctx.scale(devicePixelRatio,devicePixelRatio);
          const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;
          ctx.clearRect(0,0,w,h);
          ctx.fillStyle="#020617";ctx.fillRect(0,0,w,h);
          const padL=70,padR=18,padT=26,padB=50;
          const pts=historyPoints.filter(function(p){const ms=p.ts*1000;return viewStart===null||ms>=viewStart&&ms<=viewEnd});
          ctx.strokeStyle="#1e293b";ctx.lineWidth=1;
          for(let i=0;i<6;i++){let yy=padT+(h-padT-padB)*i/5;ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(w-padR,yy);ctx.stroke()}
          if(!pts.length){ctx.fillStyle="#94a3b8";ctx.fillText("Пока нет данных. Подожди несколько секунд.",padL,padT+30);return}

          const metrics = ioMode ? ["read_mbps","write_mbps"] : [document.getElementById("metricSelect").value];
          let values=[];
          pts.forEach(function(p){metrics.forEach(function(m){values.push(valOf(p,m))})});
          let min=Math.min(...values),max=Math.max(...values);
          if(min===max){min-=1;max+=1}
          if(ioMode){min=0}

          const x0=viewStart||pts[0].ts*1000,x1=viewEnd||pts[pts.length-1].ts*1000;
          function x(ms){return padL+(ms-x0)/(x1-x0)*(w-padL-padR)}
          function y(v){return h-padB-(v-min)/(max-min)*(h-padT-padB)}
          ctx.fillStyle="#94a3b8";ctx.font="12px system-ui";
          for(let i=0;i<6;i++){let val=min+(max-min)*(5-i)/5;let yy=padT+(h-padT-padB)*i/5;ctx.fillText(val.toFixed(1),8,yy+4)}
          if(ioMode){
            drawLine(ctx,pts,"read_mbps",x,y,"#60a5fa");
            drawLine(ctx,pts,"write_mbps",x,y,"#f59e0b");
            ctx.fillStyle="#cbd5e1";ctx.fillText("MB/s",padL,padT-8);
          }else{
            const metric=document.getElementById("metricSelect").value;
            drawLine(ctx,pts,metric,x,y,"#60a5fa");
            ctx.fillStyle="#cbd5e1";ctx.fillText(metricLabel(metric),padL,padT-8);
          }

          if(hoverX!==null){
            const hoverMs=x0+(hoverX-padL)/(w-padL-padR)*(x1-x0);
            let nearest=pts[0],best=Math.abs(pts[0].ts*1000-hoverMs);
            pts.forEach(function(p){let diff=Math.abs(p.ts*1000-hoverMs);if(diff<best){best=diff;nearest=p}});
            const hx=x(nearest.ts*1000);
            ctx.strokeStyle="#64748b";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(hx,padT);ctx.lineTo(hx,h-padB);ctx.stroke();
            const boxW=230,boxH=104;
            let bx=hx+12;if(bx+boxW>w-padR)bx=hx-boxW-12;
            let by=padT+12;
            ctx.fillStyle="rgba(15,23,42,.96)";ctx.strokeStyle="#334155";ctx.lineWidth=1;
            ctx.beginPath();ctx.roundRect(bx,by,boxW,boxH,10);ctx.fill();ctx.stroke();
            ctx.fillStyle="#e5e7eb";ctx.font="12px system-ui";
            ctx.fillText(new Date(nearest.ts*1000).toLocaleString(),bx+10,by+20);
            ctx.fillStyle="#bfdbfe";ctx.fillText("Занято: "+n(nearest.used_gb).toFixed(1)+" GB",bx+10,by+40);
            ctx.fillStyle="#bbf7d0";ctx.fillText("Свободно: "+n(nearest.free_gb).toFixed(1)+" GB",bx+10,by+58);
            ctx.fillStyle="#fde68a";ctx.fillText("Процент: "+n(nearest.percent).toFixed(1)+"%",bx+10,by+76);
            ctx.fillStyle="#93c5fd";ctx.fillText("R/W: "+n(nearest.read_mbps).toFixed(3)+" / "+n(nearest.write_mbps).toFixed(3)+" MB/s",bx+10,by+94);
          }

          ctx.fillStyle="#cbd5e1";
          ctx.fillText(new Date(x0).toLocaleString(),padL,h-16);
          ctx.textAlign="right";ctx.fillText(new Date(x1).toLocaleString(),w-padR,h-16);ctx.textAlign="left";
        }

        document.addEventListener("wheel",function(e){
          if(document.getElementById("historyOverlay").style.display!=="flex")return;
          if(e.target.id!=="historyCanvas")return;
          e.preventDefault();
          if(!historyPoints.length)return;
          const rect=e.target.getBoundingClientRect();
          const mx=(e.clientX-rect.left)/rect.width;
          const start=viewStart,end=viewEnd,span=end-start;
          const factor=e.deltaY<0?0.8:1.25;
          const center=start+span*mx;
          let ns=center-(center-start)*factor;
          let ne=center+(end-center)*factor;
          const allS=historyPoints[0].ts*1000,allE=historyPoints[historyPoints.length-1].ts*1000;
          if(ns<allS)ns=allS;if(ne>allE)ne=allE;
          if(ne-ns>1000){viewStart=ns;viewEnd=ne;drawChart()}
        },{passive:false});
        document.addEventListener("mousedown",function(e){
          if(e.target.id==="historyCanvas")drag={x:e.clientX,start:viewStart,end:viewEnd};
        });
        document.addEventListener("mousemove",function(e){
          if(document.getElementById("historyOverlay").style.display==="flex" && e.target.id==="historyCanvas"){
            const rect=e.target.getBoundingClientRect();
            hoverX=e.clientX-rect.left;
          }
          if(!drag||!historyPoints.length){drawChart();return}
          const rect=document.getElementById("historyCanvas").getBoundingClientRect();
          const dx=e.clientX-drag.x;
          const span=drag.end-drag.start;
          const shift=-dx/rect.width*span;
          const allS=historyPoints[0].ts*1000,allE=historyPoints[historyPoints.length-1].ts*1000;
          let ns=drag.start+shift,ne=drag.end+shift;
          if(ns<allS){ne+=allS-ns;ns=allS}
          if(ne>allE){ns-=ne-allE;ne=allE}
          viewStart=ns;viewEnd=ne;drawChart();
        });
        document.addEventListener("mouseleave",function(e){
          if(e.target && e.target.id==="historyCanvas"){hoverX=null;drawChart()}
        });
        document.addEventListener("mouseup",function(){drag=null});

        function openTop(encodedPath,name){
          currentTopPath=encodedPath;
          currentTopName=name;
          currentTopJob="";
          document.getElementById("topTitle").textContent="Топ папок: "+name;
          document.getElementById("topOverlay").style.display="flex";
          document.getElementById("topBody").innerHTML='Выбери режим и нажми “Сканировать”.';
        }
        function closeTop(){
          document.getElementById("topOverlay").style.display="none";
          if(topPollTimer){clearInterval(topPollTimer);topPollTimer=null}
        }
        async function startTopScan(){
          if(topPollTimer){clearInterval(topPollTimer);topPollTimer=null}
          const timeout=document.getElementById("topTimeout").value;
          document.getElementById("topBody").innerHTML='<div class="spinnerWrap"><div class="spinner"></div><div>Запускаю сканирование...</div></div>';
          const r=await fetch('api/top/start?host_path='+currentTopPath+'&limit=20&timeout='+encodeURIComponent(timeout)+'&ts='+Date.now(),{cache:'no-store'});
          const d=await r.json();
          if(d.error){document.getElementById("topBody").innerHTML='<p class="error">'+t(d.error)+'</p>';return}
          currentTopJob=d.job_id;
          topPollTimer=setInterval(pollTop,1000);
          pollTop();
        }
        async function cancelTopScan(){
          if(!currentTopJob)return;
          await fetch('api/top/cancel?job_id='+encodeURIComponent(currentTopJob)+'&ts='+Date.now(),{cache:'no-store'});
        }
        async function pollTop(){
          if(!currentTopJob)return;
          const r=await fetch('api/top/status?job_id='+encodeURIComponent(currentTopJob)+'&ts='+Date.now(),{cache:'no-store'});
          const d=await r.json();
          renderTopStatus(d);
          if(d.status==="done"||d.status==="error"||d.status==="cancelled"){
            if(topPollTimer){clearInterval(topPollTimer);topPollTimer=null}
          }
        }
        function renderTopStatus(d){
          if(d.error){document.getElementById("topBody").innerHTML='<p class="error">'+t(d.error)+'</p>';return}
          let html="";
          if(d.status==="running"||d.status==="queued"){
            html+='<div class="spinnerWrap"><div class="spinner"></div><div><b>Сканирование идёт...</b><div class="pathNow">Сейчас: '+t(d.current_path)+'</div></div></div>';
          }
          if(d.status==="cancelled")html+='<p class="warnText">Сканирование отменено.</p>';
          if(d.status==="done"&&d.timed_out){
            html+='<p class="warnText">Сканирование упёрлось в лимит '+t(d.timeout_sec)+' сек. Можно выбрать режим дольше или “Полный скан — без таймаута” и запустить заново.</p>';
          }
          if(d.status==="done"&&!d.timed_out)html+='<p>Готово.</p>';
          html+='<div class="progress">Просмотрено элементов: '+t(d.scanned_entries||0)+' · файлов: '+t(d.scanned_files||0)+' · ошибок доступа: '+t(d.errors||0)+'</div>';
          const items=d.items||[];
          html+='<table class="table"><tr><th>Папка/файл</th><th>Тип</th><th>Размер</th><th>Путь</th></tr>';
          items.forEach(function(x){html+='<tr><td>'+t(x.name)+'</td><td>'+t(x.type)+'</td><td>'+t(x.size_gb)+' GB</td><td>'+t(x.host_path)+'</td></tr>'});
          html+='</table>';
          document.getElementById("topBody").innerHTML=html;
        }

        load();
        setTimeout(loadLiveIo,700);
        setInterval(load,5000);
        setInterval(loadLiveIo,1000);
        setInterval(function(){if(document.getElementById("historyOverlay").style.display==="flex")loadHistory()},2000);
        </script>
        </body>
        </html>"""


        class Handler(BaseHTTPRequestHandler):
            def send_json(self, payload):
                body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "application/json; charset=utf-8")
                self.send_header("Cache-Control", "no-store")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            def do_GET(self):
                parsed = urlparse(self.path)
                path = parsed.path.rstrip("/")
                query = parse_qs(parsed.query)

                if path == "":
                    body = HTML.encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html; charset=utf-8")
                    self.send_header("Cache-Control", "no-store")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                if path == "/api/disks":
                    self.send_json(get_current_data())
                    return

                if path == "/api/history":
                    self.send_json(history_data(query))
                    return

                if path == "/api/live":
                    self.send_json(get_live_io_data())
                    return

                if path == "/api/history/clear":
                    self.send_json(clear_history())
                    return

                if path == "/api/top/start":
                    self.send_json(start_top_job(query))
                    return

                if path == "/api/top/status":
                    self.send_json(top_status(query))
                    return

                if path == "/api/top/cancel":
                    self.send_json(cancel_top_job(query))
                    return

                self.send_response(404)
                self.end_headers()

            def log_message(self, *args):
                return


        init_db()
        compact_history(True)
        threading.Thread(target=sampler_loop, daemon=True).start()
        ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
        PY
        python /tmp/server.py
