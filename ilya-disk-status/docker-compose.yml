services:
  app_proxy:
    environment:
      APP_HOST: server
      APP_PORT: 8080

  server:
    image: python:3.12-alpine
    restart: on-failure
    init: true
    stop_grace_period: 1m
    volumes:
      - type: bind
        source: /home/umbrel/umbrel/external/ssd990_main
        target: /disks/ssd990_main
        read_only: true
      - type: bind
        source: /home/umbrel/umbrel/external/backup_umbrel_hdd
        target: /disks/backup_umbrel_hdd
        read_only: true
    command:
      - sh
      - -c
      - |
        cat > /tmp/server.py <<'PY'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json
        import os
        import time

        DISKS = {
            "SSD990_MAIN": "/disks/ssd990_main",
            "BACKUP_HDD": "/disks/backup_umbrel_hdd",
        }

        def gib(bytes_value):
            return round(bytes_value / 1073741824, 1)

        def disk_info(path):
            st = os.statvfs(path)
            total = st.f_blocks * st.f_frsize
            free = st.f_bavail * st.f_frsize
            used = total - free
            percent = round((used / total) * 100, 1) if total else 0
            return {
                "path": path,
                "total_gb": gib(total),
                "used_gb": gib(used),
                "free_gb": gib(free),
                "percent": percent,
            }

        def get_data():
            result = {}
            for name, path in DISKS.items():
                try:
                    result[name] = disk_info(path)
                except Exception as err:
                    result[name] = {"error": str(err), "path": path}
            result["updated_at"] = int(time.time())
            return result

        def page():
            return """<!doctype html>
        <html lang="ru">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Disk Status</title>
          <style>
            * { box-sizing: border-box; }
            body {
              margin: 0;
              font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              background: radial-gradient(circle at top, #1e293b, #020617 70%);
              color: #e5e7eb;
            }
            .wrap {
              max-width: 940px;
              margin: 40px auto;
              padding: 0 20px 40px;
            }
            h1 {
              font-size: 36px;
              margin: 0 0 8px;
              letter-spacing: -0.03em;
            }
            .sub {
              color: #94a3b8;
              margin-bottom: 28px;
            }
            .grid {
              display: grid;
              grid-template-columns: repeat(2, minmax(0, 1fr));
              gap: 18px;
            }
            .card {
              background: rgba(15, 23, 42, 0.9);
              border: 1px solid #243244;
              border-radius: 22px;
              padding: 22px;
              box-shadow: 0 16px 40px rgba(0,0,0,.35);
            }
            .top {
              display: flex;
              justify-content: space-between;
              gap: 16px;
              align-items: baseline;
              margin-bottom: 14px;
            }
            .name {
              font-size: 22px;
              font-weight: 800;
            }
            .percent {
              font-size: 34px;
              font-weight: 900;
            }
            .bar {
              height: 20px;
              border-radius: 999px;
              background: #1f2937;
              overflow: hidden;
              margin: 16px 0;
              border: 1px solid #334155;
            }
            .fill {
              height: 100%;
              width: 0%;
              background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
              border-radius: 999px;
              transition: width .35s ease;
            }
            .stats {
              display: grid;
              grid-template-columns: repeat(3, minmax(0, 1fr));
              gap: 10px;
            }
            .stat {
              background: #020617;
              border: 1px solid #1e293b;
              border-radius: 14px;
              padding: 12px;
            }
            .label {
              color: #94a3b8;
              font-size: 13px;
              margin-bottom: 5px;
            }
            .value {
              font-size: 18px;
              font-weight: 800;
            }
            .error {
              color: #f87171;
              font-weight: 800;
              word-break: break-word;
            }
            .footer {
              margin-top: 18px;
              color: #64748b;
              font-size: 13px;
            }
            @media (max-width: 800px) {
              .grid { grid-template-columns: 1fr; }
              .stats { grid-template-columns: 1fr; }
              .top { flex-direction: column; }
            }
          </style>
        </head>
        <body>
          <div class="wrap">
            <h1>Disk Status</h1>
            <div class="sub">Занятость внешних дисков Umbrel. Обновление каждые 10 секунд.</div>
            <div id="app">Загрузка...</div>
            <div class="footer" id="updated"></div>
          </div>

          <script>
            function text(v) {
              if (v === undefined || v === null) {
                return "";
              }
              return String(v);
            }

            function diskHtml(name, d) {
              if (d.error) {
                return '<div class="card">' +
                  '<div class="name">' + text(name) + '</div>' +
                  '<p class="error">' + text(d.error) + '</p>' +
                  '<p>' + text(d.path) + '</p>' +
                  '</div>';
              }

              return '<div class="card">' +
                '<div class="top">' +
                  '<div class="name">' + text(name) + '</div>' +
                  '<div class="percent">' + text(d.percent) + '%</div>' +
                '</div>' +
                '<div class="bar"><div class="fill" style="width:' + text(d.percent) + '%"></div></div>' +
                '<div class="stats">' +
                  '<div class="stat"><div class="label">Занято</div><div class="value">' + text(d.used_gb) + ' GB</div></div>' +
                  '<div class="stat"><div class="label">Свободно</div><div class="value">' + text(d.free_gb) + ' GB</div></div>' +
                  '<div class="stat"><div class="label">Всего</div><div class="value">' + text(d.total_gb) + ' GB</div></div>' +
                '</div>' +
              '</div>';
            }

            async function load() {
              try {
                const res = await fetch('api/disks');
                const data = await res.json();

                let result = "";
                Object.keys(data).forEach(function(k) {
                  if (k !== "updated_at") {
                    result += diskHtml(k, data[k]);
                  }
                });

                document.getElementById('app').innerHTML = '<div class="grid">' + result + '</div>';
                document.getElementById('updated').textContent = 'Последнее обновление: ' + new Date().toLocaleString();
              } catch (err) {
                document.getElementById('app').innerHTML =
                  '<div class="card"><p class="error">' + String(err) + '</p></div>';
              }
            }

            load();
            setInterval(load, 10000);
          </script>
        </body>
        </html>"""

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                path = self.path.split("?", 1)[0].rstrip("/")
                if path == "":
                    body = page().encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "text/html; charset=utf-8")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                if path == "/api/disks":
                    body = json.dumps(get_data(), ensure_ascii=False).encode("utf-8")
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json; charset=utf-8")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                self.send_response(404)
                self.end_headers()

            def log_message(self, format, *args):
                return

        HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
        PY

        python /tmp/server.py
